<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>평지붕 강판 배치 평면도</title>
<style>
  * { box-sizing: border-box; }
  body { font-family:'Malgun Gothic',sans-serif; background:#f0f2f5; padding:16px; color:#333; margin:0; }
  h2  { margin:0 0 4px; font-size:18px; }
  .sub{ color:#666; font-size:12px; margin-bottom:14px; }

  .form-card { background:white; border-radius:10px; padding:14px 18px; box-shadow:0 2px 8px rgba(0,0,0,.1);
               margin-bottom:14px; display:flex; flex-wrap:wrap; gap:10px 20px; align-items:flex-end; }
  .form-group { display:flex; flex-direction:column; gap:3px; }
  .form-group label { font-size:11px; color:#666; font-weight:bold; }
  .form-group input, .form-group select {
    border:1px solid #ccc; border-radius:6px; padding:5px 8px;
    font-size:13px; font-family:inherit; width:90px; background:#fff; }
  .form-group select { width:180px; }
  .btn-calc { background:#1a5fb4; color:white; border:none; padding:8px 18px;
              border-radius:7px; font-size:13px; cursor:pointer; font-family:inherit; font-weight:bold; }
  .btn-calc:hover { background:#1347a0; }

  .outer { display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap; }
  .col-left  { display:flex; flex-direction:column; gap:14px; }
  .col-right { display:flex; flex-direction:column; gap:14px; min-width:0; flex:0 0 300px; max-width:340px; }
  .card { background:white; border-radius:10px; padding:14px 16px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
  .sec-title { font-size:12px; font-weight:bold; color:#1a3a6a; margin:0 0 10px;
               padding-bottom:5px; border-bottom:2px solid #e8eef8; }

  .orient-tabs { display:flex; gap:6px; margin-bottom:10px; }
  .tab-btn { background:#f0f4f8; border:1px solid #cce; border-radius:6px; padding:4px 12px;
             font-size:11px; cursor:pointer; font-family:inherit; color:#1a3a6a; font-weight:bold; }
  .tab-btn.active { background:#1a5fb4; color:white; border-color:#1a5fb4; }

  .tbl-wrap { overflow-x:auto; width:100%; }
  table { border-collapse:collapse; width:100%; font-size:11px; margin-top:6px; }
  th { background:#f0f4f8; padding:4px 5px; border:1px solid #ddd; text-align:center; font-size:10px; }
  td { padding:3px 5px; border:1px solid #eee; text-align:center; font-size:11px; }
  .tr-sub td { font-weight:bold; background:#fffbe6; }
  .tr-grand td { font-weight:bold; background:#e8f4ff; }
  .tr-best td { font-weight:bold; background:#e8f4e8; }
  .note { font-size:11px; color:#888; margin-top:8px; line-height:1.7; }
  .empty { color:#aaa; font-size:13px; text-align:center; padding:40px 0; }
</style>
</head>
<body>
<h2>📐 평지붕 강판 배치 평면도</h2>
<p class="sub" id="specLine">수치를 입력하고 [계산] 버튼을 누르세요.</p>

<div class="form-card">
  <div class="form-group">
    <label>처마포함 가로 W (m)</label>
    <input id="inp-W" type="number" step="0.01" placeholder="예) 10.0">
  </div>
  <div class="form-group">
    <label>처마포함 세로 D (m)</label>
    <input id="inp-D" type="number" step="0.01" placeholder="예) 8.0">
  </div>
  <div class="form-group">
    <label>강판 유효폭 (mm)</label>
    <select id="inp-ew">
      <option value="700">700mm</option>
      <option value="720">720mm</option>
      <option value="600">600mm</option>
      <option value="914">914mm</option>
      <option value="500">500mm</option>
      <option value="400">400mm</option>
    </select>
  </div>
  <div class="form-group">
    <label>강판 길이 (mm)</label>
    <input id="inp-sl" type="number" step="100" placeholder="예) 3600">
  </div>
  <div class="form-group">
    <label>파라펫 높이 (m) <span style="color:#999;font-weight:normal">선택</span></label>
    <input id="inp-pH" type="number" step="0.05" placeholder="예) 0.3">
  </div>
  <div class="form-group">
    <label>파라펫 두께 (m) <span style="color:#999;font-weight:normal">선택</span></label>
    <input id="inp-pW" type="number" step="0.05" placeholder="예) 0.2">
  </div>
  <button class="btn-calc" onclick="renderAll()">계산</button>
</div>

<div class="outer">
  <div class="col-left">
    <div class="card">
      <p class="sec-title">① 지붕 평면도 (위에서 본 모습)</p>
      <div class="orient-tabs">
        <button class="tab-btn active" id="tabH" onclick="switchOrient('H')">가로 배치 (ew → W방향)</button>
        <button class="tab-btn" id="tabV" onclick="switchOrient('V')">세로 배치 (ew → D방향)</button>
      </div>
      <div id="planWrap"><p class="empty">수치를 입력해 주세요</p></div>
    </div>
  </div>
  <div class="col-right">
    <div class="card">
      <p class="sec-title">색상 범례</p>
      <div id="legendWrap"></div>
    </div>
    <div class="card">
      <p class="sec-title">방향별 비교</p>
      <div id="compTableWrap"><p class="empty" style="padding:20px 0">—</p></div>
    </div>
    <div class="card">
      <p class="sec-title">수량표</p>
      <div id="countTableWrap"><p class="empty" style="padding:20px 0">—</p></div>
    </div>
  </div>
</div>

<div class="card" style="margin-top:14px">
  <p class="sec-title">📦 발주표</p>
  <div id="orderTableWrap"><p class="empty" style="padding:10px 0">—</p></div>
  <p class="note">
    ※ 평지붕 강판 = 유효폭 × 강판길이 &nbsp;|&nbsp;
    ※ 배치 방향에 따라 절단 손실 달라짐 &nbsp;|&nbsp;
    ※ 장수 적은 방향 추천 &nbsp;|&nbsp;
    ※ 파라펫 내측·상단 방수는 별도 계산
  </p>
</div>

<script>
const QS = new URLSearchParams(location.search);
function qp(k){ return QS.get(k); }

let _state = null;
let _orient = 'H';

window.addEventListener('load', () => {
  if(qp('w'))  document.getElementById('inp-W').value  = parseFloat(qp('w')).toFixed(3);
  if(qp('d'))  document.getElementById('inp-D').value  = parseFloat(qp('d')).toFixed(3);
  if(qp('sl')) document.getElementById('inp-sl').value = qp('sl');
  if(qp('pH')) document.getElementById('inp-pH').value = qp('pH');
  if(qp('pW')) document.getElementById('inp-pW').value = qp('pW');
  if(qp('ew')){
    const sel = document.getElementById('inp-ew');
    for(let i=0;i<sel.options.length;i++)
      if(sel.options[i].value===qp('ew')) sel.selectedIndex=i;
  }
  if(qp('w')&&qp('d')&&qp('sl')) renderAll();
});

const NS='http://www.w3.org/2000/svg';
function mk(tag,attrs){
  const e=document.createElementNS(NS,tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}
function mRect(x,y,w,h,fill,stroke,sw=0.5,extra={}){
  return mk('rect',{x,y,width:w,height:h,fill,stroke,'stroke-width':sw,...extra});
}
function mLine(x1,y1,x2,y2,stroke='#666',sw=1,dash=''){
  const e=mk('line',{x1,y1,x2,y2,stroke,'stroke-width':sw});
  if(dash)e.setAttribute('stroke-dasharray',dash);
  return e;
}
function mTxt(x,y,t,size=11,color='#333',anchor='middle',weight='normal'){
  const e=mk('text',{x,y,'font-size':size,fill:color,'text-anchor':anchor,
    'font-family':'Malgun Gothic,sans-serif','font-weight':weight});
  e.textContent=t; return e;
}
function dimLine(svg,x1,y1,x2,y2,label,color='#888',size=10){
  svg.appendChild(mLine(x1,y1,x2,y2,color,1));
  if(x1===x2){
    svg.appendChild(mLine(x1-5,y1,x1+5,y1,color,1));
    svg.appendChild(mLine(x1-5,y2,x1+5,y2,color,1));
    const t=mTxt(x1-14,(y1+y2)/2,label,size,color,'middle');
    t.setAttribute('transform',`rotate(-90,${x1-14},${(y1+y2)/2})`);
    svg.appendChild(t);
  } else {
    svg.appendChild(mLine(x1,y1-5,x1,y1+5,color,1));
    svg.appendChild(mLine(x2,y2-5,x2,y2+5,color,1));
    svg.appendChild(mTxt((x1+x2)/2,y1-8,label,size,color,'middle'));
  }
}

function renderAll(){
  const W_m  = parseFloat(document.getElementById('inp-W').value);
  const D_m  = parseFloat(document.getElementById('inp-D').value);
  const ewMM = parseFloat(document.getElementById('inp-ew').value);
  const slMM = parseFloat(document.getElementById('inp-sl').value);
  const pH   = parseFloat(document.getElementById('inp-pH').value) || 0;
  const pW   = parseFloat(document.getElementById('inp-pW').value) || 0;

  if(isNaN(W_m)||isNaN(D_m)||isNaN(slMM)||W_m<=0||D_m<=0||slMM<=0){
    alert('가로, 세로, 강판길이를 올바르게 입력해 주세요.'); return;
  }

  const ew_m = ewMM/1000;
  const sl_m = slMM/1000;

  // 가로 배치: ew → W방향, sl → D방향
  const nColsH = Math.ceil(parseFloat((W_m/ew_m).toFixed(6)));
  const nRowsH = Math.ceil(parseFloat((D_m/sl_m).toFixed(6)));
  const sheetsH = nColsH * nRowsH;

  // 세로 배치: ew → D방향, sl → W방향
  const nColsV = Math.ceil(parseFloat((W_m/sl_m).toFixed(6)));
  const nRowsV = Math.ceil(parseFloat((D_m/ew_m).toFixed(6)));
  const sheetsV = nColsV * nRowsV;

  const bestOrient = sheetsH <= sheetsV ? 'H' : 'V';

  _state = { W_m, D_m, ew_m, sl_m, ewMM, slMM,
             nColsH, nRowsH, sheetsH,
             nColsV, nRowsV, sheetsV,
             bestOrient, pH, pW };

  document.getElementById('specLine').textContent =
    `W=${W_m}m × D=${D_m}m | 유효폭 ${ewMM}mm | 강판길이 ${slMM}mm` +
    (pH>0 ? ` | 파라펫 ${pH}m` : '') +
    ` | 추천방향: ${bestOrient==='H'?'가로 배치':'세로 배치'} (${Math.min(sheetsH,sheetsV)}장)`;

  // 기본 탭 = 추천 방향
  _orient = bestOrient;
  document.getElementById('tabH').className = 'tab-btn' + (_orient==='H' ? ' active' : '');
  document.getElementById('tabV').className = 'tab-btn' + (_orient==='V' ? ' active' : '');

  drawPlan();
  renderRightPanel();
}

function switchOrient(o){
  if(!_state) return;
  _orient = o;
  document.getElementById('tabH').className = 'tab-btn' + (o==='H' ? ' active' : '');
  document.getElementById('tabV').className = 'tab-btn' + (o==='V' ? ' active' : '');
  drawPlan();
  renderCountTable();
}

// ① 평면도
function drawPlan(){
  if(!_state) return;
  const {W_m,D_m,ew_m,sl_m,pH,pW} = _state;

  // 셀 치수 (현재 배치 방향)
  const cellW_m = _orient==='H' ? ew_m : sl_m;  // W방향 셀 폭
  const cellH_m = _orient==='H' ? sl_m : ew_m;  // D방향 셀 높이

  // 스케일: 최대 560px
  const maxDim = Math.max(W_m, D_m);
  const SC = Math.min(55, Math.floor(560/maxDim));
  const MX=72, MY=58;
  const W=W_m*SC, D=D_m*SC;

  const nCols = Math.ceil(parseFloat((W_m/cellW_m).toFixed(6)));
  const nRows = Math.ceil(parseFloat((D_m/cellH_m).toFixed(6)));

  const svgW=W+MX+70, svgH=D+MY+70;
  const svg=mk('svg',{width:svgW, height:svgH});

  // clip
  const defs=mk('defs',{});
  const cp=mk('clipPath',{id:'cp'});
  cp.appendChild(mk('rect',{x:MX,y:MY,width:W,height:D}));
  defs.appendChild(cp);
  svg.appendChild(defs);

  const FILL_FULL='#5ba4f5', FILL_PART='#ffaa44';
  const STR='#1a5fb4', STR_PART='#c06010';

  // 셀 그리기
  for(let col=0;col<nCols;col++){
    for(let row=0;row<nRows;row++){
      const cx=col*cellW_m, cy=row*cellH_m;
      const cw=cellW_m, ch=cellH_m;
      const isPartialW=(col+1)*cellW_m > W_m+0.001;
      const isPartialH=(row+1)*cellH_m > D_m+0.001;
      const isPartial=isPartialW||isPartialH;
      const fill=isPartial?FILL_PART:FILL_FULL;
      const str=isPartial?STR_PART:STR;
      const r=mRect(MX+cx*SC, MY+cy*SC, cw*SC, ch*SC, fill, str, 0.5);
      r.setAttribute('clip-path','url(#cp)');
      svg.appendChild(r);
      // 번호 라벨
      if(cw*SC>18 && ch*SC>12){
        const t=mTxt(MX+(cx+cw/2)*SC, MY+(cy+ch/2)*SC+3,
          `${col+1}-${row+1}`, Math.min(8,Math.min(cw*SC,ch*SC)*0.35), '#1a3a6a','middle');
        t.setAttribute('clip-path','url(#cp)');
        svg.appendChild(t);
      }
    }
  }

  // 그리드 선 (W방향)
  for(let col=1;col<nCols;col++){
    const x=MX+col*cellW_m*SC;
    const ln=mLine(x,MY,x,MY+D,'#1a5fb4',0.4);
    svg.appendChild(ln);
  }
  // 그리드 선 (D방향)
  for(let row=1;row<nRows;row++){
    const y=MY+row*cellH_m*SC;
    const ln=mLine(MX,y,MX+W,y,'#1a5fb4',0.4);
    svg.appendChild(ln);
  }

  // 외곽선
  svg.appendChild(mLine(MX,MY,MX+W,MY,'#333',2));
  svg.appendChild(mLine(MX,MY+D,MX+W,MY+D,'#333',2));
  svg.appendChild(mLine(MX,MY,MX,MY+D,'#333',2));
  svg.appendChild(mLine(MX+W,MY,MX+W,MY+D,'#333',2));

  // 파라펫 (점선)
  if(pH>0 && pW>0){
    const pxPW=pW*SC;
    svg.appendChild(mRect(MX-pxPW, MY-pxPW, W+pxPW*2, D+pxPW*2, 'none', '#888', 2.5, {'stroke-dasharray':'6,3'}));
    svg.appendChild(mTxt(MX+W+pxPW+6, MY, `파라펫 두께 ${pW}m`, 8, '#888','start'));
    svg.appendChild(mTxt(MX+W+pxPW+6, MY+12, `높이 ${pH}m`, 8, '#888','start'));
  }

  // 치수
  dimLine(svg, MX, MY-32, MX+W, MY-32, `가로 ${W_m}m`);
  dimLine(svg, MX-40, MY, MX-40, MY+D, `세로 ${D_m}m`);

  // 셀 치수 (첫 셀 상단에)
  const cw1=Math.min(cellW_m*SC, W);
  svg.appendChild(mLine(MX, MY+D+18, MX+cw1, MY+D+18, '#888', 0.8));
  svg.appendChild(mLine(MX, MY+D+14, MX, MY+D+22, '#888', 1));
  svg.appendChild(mLine(MX+cw1, MY+D+14, MX+cw1, MY+D+22, '#888', 1));
  svg.appendChild(mTxt(MX+cw1/2, MY+D+32, `${_orient==='H'?`유효폭 ${_state.ewMM}mm`:` 강판길이 ${_state.slMM}mm`}`, 8, '#888'));

  const ch1=Math.min(cellH_m*SC, D);
  svg.appendChild(mLine(MX+W+18, MY, MX+W+18, MY+ch1, '#888', 0.8));
  svg.appendChild(mLine(MX+W+14, MY, MX+W+22, MY, '#888', 1));
  svg.appendChild(mLine(MX+W+14, MY+ch1, MX+W+22, MY+ch1, '#888', 1));
  const dtR=mTxt(MX+W+30, MY+ch1/2, `${_orient==='H'?`강판길이 ${_state.slMM}mm`:`유효폭 ${_state.ewMM}mm`}`, 8, '#888','middle');
  dtR.setAttribute('transform',`rotate(-90,${MX+W+30},${MY+ch1/2})`);
  svg.appendChild(dtR);

  // 배치방향 라벨
  const orLabel=_orient==='H'?'◀ 유효폭 방향 ▶':'◀ 강판길이 방향 ▶';
  svg.appendChild(mTxt(MX+W/2, MY+D+50, orLabel, 9, '#1a3a6a','middle','bold'));

  const wrap=document.getElementById('planWrap');
  wrap.innerHTML=''; wrap.appendChild(svg);
}

// 우측 패널
function renderRightPanel(){
  const {sheetsH, sheetsV, bestOrient, ewMM, slMM} = _state;

  // 범례
  document.getElementById('legendWrap').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px">
      <div style="width:24px;height:13px;background:#5ba4f5;border:1px solid #1a5fb4;border-radius:3px;flex-shrink:0"></div>
      <div>정형 (전체 규격)</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px">
      <div style="width:24px;height:13px;background:#ffaa44;border:1px solid #c06010;border-radius:3px;flex-shrink:0"></div>
      <div>부분 (절단 필요)</div>
    </div>
    <p class="note" style="margin-top:8px">
      ※ 유효폭 ${ewMM}mm × 강판길이 ${slMM}mm<br>
      ※ 번호 형식: 열-행 (예: 2-3)
    </p>`;

  // 비교표
  document.getElementById('compTableWrap').innerHTML=`
    <div class="tbl-wrap"><table>
      <tr><th>배치 방향</th><th>열×행</th><th>합계</th><th></th></tr>
      <tr class="${bestOrient==='H'?'tr-best':''}">
        <td>가로 배치</td>
        <td>${_state.nColsH}×${_state.nRowsH}</td>
        <td><b>${sheetsH}장</b></td>
        <td>${bestOrient==='H'?'★추천':''}</td>
      </tr>
      <tr class="${bestOrient==='V'?'tr-best':''}">
        <td>세로 배치</td>
        <td>${_state.nColsV}×${_state.nRowsV}</td>
        <td><b>${sheetsV}장</b></td>
        <td>${bestOrient==='V'?'★추천':''}</td>
      </tr>
    </table></div>`;

  renderCountTable();
}

function renderCountTable(){
  if(!_state) return;
  const {W_m,D_m,ew_m,sl_m,ewMM,slMM} = _state;
  const cellW_m = _orient==='H' ? ew_m : sl_m;
  const cellH_m = _orient==='H' ? sl_m : ew_m;
  const nCols = Math.ceil(parseFloat((W_m/cellW_m).toFixed(6)));
  const nRows = Math.ceil(parseFloat((D_m/cellH_m).toFixed(6)));
  const totalSheets = nCols * nRows;

  // 정형 / 부분 구분
  const lastColW = W_m - (nCols-1)*cellW_m;
  const lastRowH = D_m - (nRows-1)*cellH_m;
  const isLastColPartial = lastColW < cellW_m - 0.001;
  const isLastRowPartial = lastRowH < cellH_m - 0.001;

  const fullCols = isLastColPartial ? nCols-1 : nCols;
  const fullRows = isLastRowPartial ? nRows-1 : nRows;
  const fullSheets = fullCols * fullRows;
  const partSheets = totalSheets - fullSheets;

  const dirLabel = _orient==='H' ? '가로 배치 (ew→W)' : '세로 배치 (ew→D)';

  document.getElementById('countTableWrap').innerHTML=`
    <div class="tbl-wrap"><table>
      <tr><th colspan="2">${dirLabel}</th></tr>
      <tr><td>정형 (완전규격)</td><td><b>${fullSheets}장</b></td></tr>
      ${partSheets>0?`<tr><td>부분 (절단)</td><td><b>${partSheets}장</b></td></tr>`:''}
      <tr class="tr-sub"><td>합 계</td><td><b>${totalSheets}장</b></td></tr>
    </table></div>
    <p class="note" style="margin-top:8px">
      ※ ${nCols}열 × ${nRows}행 = ${totalSheets}장<br>
      ${isLastColPartial?`※ 마지막 열 폭: ${lastColW.toFixed(3)}m (절단)<br>`:''}
      ${isLastRowPartial?`※ 마지막 행 높이: ${lastRowH.toFixed(3)}m (절단)<br>`:''}
      ※ 전 장수 규격: ${ewMM}mm × ${slMM}mm
    </p>`;

  document.getElementById('orderTableWrap').innerHTML=`
    <table style="width:100%;max-width:500px">
      <tr><th>규격</th><th>정형</th>${partSheets>0?'<th>부분(절단)</th>':''}<th>합계</th></tr>
      <tr>
        <td><b>${ewMM}mm × ${slMM}mm</b></td>
        <td>${fullSheets}장</td>
        ${partSheets>0?`<td>${partSheets}장</td>`:''}
        <td><b>${totalSheets}장</b></td>
      </tr>
      <tr class="tr-grand">
        <td><b>합 계</b></td>
        <td>${fullSheets}장</td>
        ${partSheets>0?`<td>${partSheets}장</td>`:''}
        <td><b>${totalSheets}장</b></td>
      </tr>
    </table>`;
}
</script>
</body>
</html>
