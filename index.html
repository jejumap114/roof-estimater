function downloadPriceTemplate() {
  const rows = [];
  // 컬럼 헤더
  rows.push(['자재명', '규격', '단위', '단가(원)', '키(수정금지)']);

  // 섹션별로 구분선 + 자재 목록
  SECTIONS.forEach(sec => {
    // 섹션 구분 행 (자재명 컬럼에 섹션 제목)
    rows.push([`▶ ${sec.title}`, '', '', '', '']);
    sec.items.forEach((item, idx) => {
      const key = `${sec.id}-${idx}`;
      const s = state[key];
      rows.push([item.name, item.spec || '', item.unit, s ? s.price : item.price, key]);
    });
    // 섹션 구분 빈 행
    rows.push(['', '', '', '', '']);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 열 너비
  ws['!cols'] = [
    { wch: 32 },
    { wch: 36 },
    { wch: 8  },
    { wch: 13 },
    { wch: 22 },
  ];

  // 스타일 적용
  const range = XLSX.utils.decode_range(ws['!ref']);
  let rowCursor = 0;

  // 컬럼 헤더 스타일 (1행)
  for (let C = 0; C <= 4; C++) {
    const addr = XLSX.utils.encode_cell({ r: 0, c: C });
    if (!ws[addr]) ws[addr] = { v: '', t: 's' };
    ws[addr].s = {
      fill: { fgColor: { rgb: '2A1A4A' } },
      font: { bold: true, color: { rgb: 'C46FFF' } },
      alignment: { horizontal: 'center' },
      border: { bottom: { style: 'medium', color: { rgb: 'C46FFF' } } }
    };
  }

  // 섹션 헤더 행 찾아서 스타일 적용
  rows.forEach((row, r) => {
    if (r === 0) return;
    const cellA = ws[XLSX.utils.encode_cell({ r, c: 0 })];
    if (cellA && String(cellA.v).startsWith('▶')) {
      // 섹션 헤더 스타일
      for (let C = 0; C <= 4; C++) {
        const addr = XLSX.utils.encode_cell({ r, c: C });
        if (!ws[addr]) ws[addr] = { v: '', t: 's' };
        ws[addr].s = {
          fill: { fgColor: { rgb: '1A2A1A' } },
          font: { bold: true, color: { rgb: '3DBA7A' } },
        };
      }
    } else if (row[0] === '' && row[4] === '') {
      // 빈 구분 행 — 얇은 하단 선
      for (let C = 0; C <= 4; C++) {
        const addr = XLSX.utils.encode_cell({ r, c: C });
        if (!ws[addr]) ws[addr] = { v: '', t: 's' };
        ws[addr].s = {
          border: { bottom: { style: 'thin', color: { rgb: '2A3045' } } }
        };
      }
    } else if (row[4] !== '') {
      // 자재 행 — 단가 컬럼 숫자 형식
      const priceAddr = XLSX.utils.encode_cell({ r, c: 3 });
      if (ws[priceAddr]) {
        ws[priceAddr].z = '#,##0';
      }
    }
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '단가표');
  XLSX.writeFile(wb, '지붕자재_단가표.xlsx');
}

function uploadPriceExcel(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      if (rows.length < 2) {
        showPriceUploadToast('❌ 데이터가 없습니다.', 'error');
        return;
      }

      // 헤더 확인 (5번째 컬럼 = 키)
      const header = rows[0].map(h => String(h).trim());
      const keyCol   = header.findIndex(h => h.includes('키'));
      const priceCol = header.findIndex(h => h.includes('단가'));
      const nameCol  = header.findIndex(h => h.includes('자재명'));
      const specCol  = header.findIndex(h => h.includes('규격'));

      if (keyCol === -1 || priceCol === -1) {
        showPriceUploadToast('❌ 양식이 맞지 않습니다. 단가표 양식을 먼저 다운로드하세요.', 'error');
        return;
      }

      let updated = 0, skipped = 0;
      rows.slice(1).forEach(row => {
        const key   = String(row[keyCol] || '').trim();
        const price = parseFloat(String(row[priceCol]).replace(/,/g, ''));
        // 섹션 헤더 행(▶) 또는 빈 구분 행 건너뜀
        if (!key || key === '' || String(row[0]).startsWith('▶')) return;
        if (!state[key]) { skipped++; return; }
        if (isNaN(price) || price < 0) { skipped++; return; }
        // state 업데이트
        const nameVal = String(row[nameCol] || '').trim();
        const specVal = String(row[specCol] || '').trim();
        state[key].price = price;
        if (nameVal) state[key].name = nameVal;
        if (specVal) state[key].spec = specVal;

        // DOM 업데이트
        const row_el = document.getElementById(`row-${key}`);
        if (row_el) {
          const priceInput = row_el.querySelector('.item-price');
          if (priceInput) priceInput.value = price;
          // 자재명/규격 업데이트
          const nameEl = row_el.querySelector('.item-name');
          if (nameEl) {
            const small = nameEl.querySelector('small');
            nameEl.childNodes[0].textContent = nameVal || state[key].name;
            if (small) small.textContent = specVal || state[key].spec || '';
          }
        }
        updated++;
      });

      // 전체 합계 재계산
      calcAll();
      Object.keys(state).forEach(k => refreshTotal(k));

      showPriceUploadToast(`✅ ${updated}개 자재 단가 적용 완료${skipped > 0 ? ` (${skipped}개 건너뜀)` : ''} — DB 저장 중...`, 'success');

      // Supabase DB 자동 저장
      if (supa) {
        const dbRows = [];
        SECTIONS.forEach(function(sec) {
          sec.items.forEach(function(item, i) {
            const key = sec.id + '-' + i;
            const s = state[key];
            const inp = document.getElementById('price-' + sec.id + '-' + i);
            dbRows.push({
              name: item.name,
              spec: item.spec || '',
              unit: item.unit,
              price: inp ? parseInt(inp.value) || item.price : item.price,
              category: sec.cat
            });
          });
        });
        supa.from('material_prices').upsert(dbRows, {onConflict:'name,spec'})
          .then(function(res) {
            if (res.error) {
              showPriceUploadToast('⚠️ 단가 적용됨, DB 저장 실패: ' + res.error.message, 'error');
            } else {
              showPriceUploadToast(`✅ ${updated}개 단가 적용 및 DB 저장 완료`, 'success');
            }
          });
      }

    } catch(err) {
      showPriceUploadToast('❌ 파일 읽기 오류: ' + err.message, 'error');
    }
    // input 초기화 (같은 파일 재업로드 가능하도록)
    input.value = '';
  };
  reader.readAsArrayBuffer(file);
}

  const C = (v, bold, align, bg, fg) => ({ v: v??'', t:'s', s:{ fill:{fgColor:{rgb:bg||'FFFFFF'}}, font:{bold:!!bold, color:{rgb:fg||'111111'}, name:'Malgun Gothic', sz:10}, alignment:{horizontal:align||'left', vertical:'center', wrapText:true}, border:bdr } });
  const N = (v, bold, bg, fg, fmt) => ({ v: v??0, t:'n', s:{ fill:{fgColor:{rgb:bg||'FFFFFF'}}, font:{bold:!!bold, color:{rgb:fg||'111111'}, name:'Malgun Gothic', sz:10}, alignment:{horizontal:'right', vertical:'center'}, numFmt:fmt||'#,##0.00', border:bdr } });
  const H  = (v) => C(v, true, 'center', 'D0D8E8', '111111');
  const BL = (bg) => C('', false, 'left', bg||'FFFFFF');

  const shapeLabels = { gable:'박공지붕', hip:'모임지붕', halfhip:'팔작지붕', shed:'외쪽지붕', flat:'평지붕', other:'기타' };

  // 컬럼 정의: A=구역명 B=지붕형태 C=수평투영 D=경사계수 E=실면적 F=할증면적 G=용마루 H=비고
  const COLS = 8;

  // ── 제목 ──
  addRow([ C('칼라강판 지붕 면적 산출표', true, 'center', '1A3A6A', 'FFFFFF'), ...Array(COLS-1).fill(C('', true, 'center', '1A3A6A', 'FFFFFF')) ]);
  MERGE(R-1, 0, COLS-1);

  // ── 컬럼 헤더 ──
  addRow([ H('구역명'), H('지붕형태'), H('수평투영(㎡)'), H('경사계수'), H('실면적(㎡)'), H('할증면적(㎡)'), H('용마루(m)'), H('비고') ]);

  let totalFlat=0, totalReal=0, totalSurcharge=0;

  _zones.forEach((z, zi) => {
    const r = z.result;
    if (!r) return;
    const name  = z.name || `구역${zi+1}`;
    const shape = shapeLabels[z.shape] || z.shape;
    const surchargeArea = (r.real||0) * (r.surchargeRate||1.1);
    totalFlat      += r.flat || 0;
    totalReal      += r.real || 0;
    totalSurcharge += surchargeArea;
    const ridgeLen = r.ridgeLen !== undefined ? r.ridgeLen : 0;
    const note = r.ridgeType ? `(${r.ridgeType})` : '';

    // ── 메인 면적 행 (헤더 바로 아래) ──
    addRow([
      C(name,  true,  'left',   'E8EEF8'),
      C(shape, false, 'center', 'E8EEF8'),
      N(r.flat||0,      false, 'E8EEF8'),
      N(r.factor||1,    false, 'E8EEF8', '111111', '0.0000'),
      N(r.real||0,      false, 'F0F8FF', '1A5FB4'),
      N(surchargeArea,  true,  'FFF0F0', 'CC0000'),
      N(ridgeLen||0,    false, 'E8EEF8'),
      C(note, false, 'left', 'E8EEF8'),
    ]);

    // ── 치수 입력값 ──
    let dims = [];
    if (r.W !== undefined) dims.push(`가로 ${r.W.toFixed(2)}m`);
    if (r.D !== undefined) dims.push(`세로 ${r.D.toFixed(2)}m`);
    if (r.slopeLen    !== undefined) dims.push(`경사길이 ${r.slopeLen.toFixed(2)}m`);
    if (r.longSlopeLen  !== undefined) dims.push(`긴면경사 ${r.longSlopeLen.toFixed(2)}m`);
    if (r.shortSlopeLen !== undefined) dims.push(`짧은면경사 ${r.shortSlopeLen.toFixed(2)}m`);
    if (dims.length) {
      addRow([ C('  └ 치수', false, 'left', 'F5F5F5', '555555'), C(dims.join('  /  '), false, 'left', 'FAFAFA'), ...Array(COLS-2).fill(BL('FAFAFA')) ]);
      MERGE(R-1, 1, COLS-1);
    }

    // ── 추녀마루 (모임지붕) ──
    if (r.hipLen !== undefined) {
      const dirs = ['①','②','③','④'];
      const lens = [r.hipLen_L||r.hipLen, r.hipLen_S||r.hipLen, r.hipLen_L||r.hipLen, r.hipLen_S||r.hipLen];
      const hipStr = dirs.map((d,i) => `${d} ${(lens[i]||0).toFixed(3)}m`).join('  ');
      addRow([ C('  └ 추녀마루', false, 'left', 'F5F5F5', '555555'), C(hipStr, false, 'left', 'FAFAFA'), ...Array(COLS-2).fill(BL('FAFAFA')) ]);
      MERGE(R-1, 1, COLS-1);
    }

    // ── 높이 정보 ──
    const hParts = [];
    if (r.wallH)  hParts.push(`처마도리 ${r.wallH.toFixed(3)}m`);
    if (r.eavH)   hParts.push(`마루높이 +${r.eavH.toFixed(3)}m`);
    if (r.ridgeH) hParts.push(`용마루높이 ${r.ridgeH.toFixed(3)}m`);
    if (hParts.length) {
      addRow([ C('  └ 높이정보', false, 'left', 'F5F5F5', '555555'), C(hParts.join('  /  '), false, 'left', 'FAFAFA'), ...Array(COLS-2).fill(BL('FAFAFA')) ]);
      MERGE(R-1, 1, COLS-1);
    }

    // ── 강판 장수 ──
    const ewEl = document.getElementById(`z${z.id}-effWidth`);
    const slEl = document.getElementById(`z${z.id}-sheetLen`);
    const ewVal = ewEl ? parseFloat(ewEl.value)||700 : 700;
    const slVal = slEl ? parseFloat(slEl.value)||3600 : 3600;
    const ew = ewVal / 1000, sl = slVal / 1000;

    addRow([ C('  └ 강판장수', false, 'left', 'F5F5F5', '555555'), C(`유효폭 ${ewVal}mm  /  강판길이 ${slVal/1000}m`, false, 'left', 'FAFAFA'), ...Array(COLS-2).fill(BL('FAFAFA')) ]);
    MERGE(R-1, 1, COLS-1);

    let sheetLines = [], totalSheets = 0;
    if (r.longSlopeLen !== undefined) {
      const lR = Math.ceil((r.W||0)/ew), sR = Math.ceil((r.D||0)/ew);
      const lC = Math.ceil(r.longSlopeLen/sl), sC = Math.ceil(r.shortSlopeLen/sl);
      const lS = lR*lC*2, sS = sR*sC*2;
      totalSheets = lS + sS;
      sheetLines = [
        `긴면(앞·뒤) ${r.longSlopeLen.toFixed(3)}m × ${lR}줄 × 2단 = ${lS}장`,
        `짧은면(좌·우) ${r.shortSlopeLen.toFixed(3)}m × ${sR}줄 × 2단 = ${sS}장`,
      ];
    } else if (r.slopeLen !== undefined) {
      const faceCount = r.faceCount||2;
      const rows_ = Math.ceil((r.slopeWidth||r.W||0)/ew);
      const cols_ = Math.ceil(r.slopeLen/sl);
      totalSheets = rows_ * cols_ * faceCount;
      sheetLines = [`경사면 ${r.slopeLen.toFixed(3)}m × ${rows_}줄 × ${faceCount}면 = ${totalSheets}장`];
    } else if (r.floorArea !== undefined) {
      const rows_ = Math.ceil((r.W||0)/ew), cols_ = Math.ceil((r.D||0)/sl);
      totalSheets = rows_ * cols_;
      sheetLines = [`${(r.W||0).toFixed(2)}m × ${(r.D||0).toFixed(2)}m = ${totalSheets}장`];
    }
    sheetLines.forEach(s => {
      addRow([ BL('F5F5F5'), C('    ' + s, false, 'left', 'FAFAFA', '333333'), ...Array(COLS-2).fill(BL('FAFAFA')) ]);
      MERGE(R-1, 1, COLS-1);
    });
    if (totalSheets > 0) {
      addRow([ BL('F5F5F5'), C('  합계', true, 'right', 'FFF0F0', 'CC0000'), C(`${totalSheets}장`, true, 'center', 'FFF0F0', 'CC0000'), ...Array(COLS-3).fill(BL('FFF0F0')) ]);
      MERGE(R-1, 2, COLS-1);
    }

    // 구역 간 여백
    addRow(Array(COLS).fill(BL('F8F8F8')));
  });

  // ── 합계 행 ──
  addRow([
    C('합  계', true, 'center', 'F0F0F0'),
    C('', false, 'center', 'F0F0F0'),
    N(totalFlat,      true, 'F0F0F0'),
    C('', false, 'center', 'F0F0F0'),
    N(totalReal,      true, 'F0F0F0', '1A5FB4'),
    N(totalSurcharge, true, 'FFE8E8', 'CC0000'),
    C('', false, 'center', 'F0F0F0'),
    C('', false, 'left',   'F0F0F0'),
  ]);

  // ── 워크시트 생성 ──
  const ws2 = XLSX.utils.aoa_to_sheet(data.map(row => row.map(c => ({ v:c.v, t:c.t }))));
  data.forEach((row, r) => {
    row.forEach((cell, c_) => {
      const addr = XLSX.utils.encode_cell({ r, c:c_ });
      if (!ws2[addr]) ws2[addr] = { v:cell.v, t:cell.t };
      if (cell.s) ws2[addr].s = cell.s;
      if (cell.t === 'n') { ws2[addr].t = 'n'; ws2[addr].z = cell.s?.numFmt || '#,##0.00'; }
    });
  });
  ws2['!merges'] = merges;
  ws2['!cols'] = [ {wch:14}, {wch:12}, {wch:14}, {wch:10}, {wch:14}, {wch:14}, {wch:12}, {wch:20} ];
  ws2['!rows'] = [{ hpt:22 }];
  return ws2;
}

function exportXLSX() {
  const siteName = document.getElementById('site-name').value || '현장';
  const siteAddr = document.getElementById('site-addr').value || '';
  const workSel  = document.getElementById('work-type');
  const workType = workSel.options[workSel.selectedIndex].text;
  const roofArea = document.getElementById('roof-area').value || '';
  const today    = new Date().toLocaleDateString('ko-KR');

  const rows = collectRows('checked');
  if (rows.length === 0) {
    alert('체크된 자재가 없습니다. 자재를 선택해주세요.');
    return;
  }

  // ── 데이터 구성 ──
  const data = []; // {v, s, t} 배열의 배열
  const merges = [];
  let R = 0; // 현재 행 인덱스

  // 헬퍼: 행 추가
  const addRow = (cells) => { data.push(cells); R++; };
  const cell = (v, s, t) => ({ v: v ?? '', s: s || {}, t: t || 's' });
  const NUM = (v, fmt) => ({ v: v ?? 0, s: { numFmt: fmt || '#,##0', alignment:{ horizontal:'right' } }, t: 'n' });
  const MERGE = (r, c1, c2) => merges.push({ s:{r,c:c1}, e:{r,c:c2} });

  // 색상 팔레트
  const COL_HEADER_BG = '2A1A4A';
  const COL_HEADER_FG = 'C46FFF';
  const COL_SEC_BG    = '1E2A1E';
  const COL_SEC_FG    = '3DBA7A';
  const COL_SUB_BG    = '1C2030';
  const COL_SUB_FG    = '8090C0';
  const COL_TOTAL_BG  = '1A1A2A';
  const COL_TOTAL_FG  = 'F0C060';
  const COL_MUTED     = '606880';
  const COL_WHITE     = 'E8EAF0';

  const hStyle = (bg, fg, bold, align) => ({
    fill: { fgColor: { rgb: bg } },
    font: { bold: !!bold, color: { rgb: fg }, name: 'Malgun Gothic', sz: 10 },
    alignment: { horizontal: align || 'left', vertical: 'center' },
    border: {
      top:    { style:'thin', color:{ rgb:'2A3045' } },
      bottom: { style:'thin', color:{ rgb:'2A3045' } },
      left:   { style:'thin', color:{ rgb:'2A3045' } },
      right:  { style:'thin', color:{ rgb:'2A3045' } },
    }
  });
  const numStyle = (bg, fg, bold) => ({
    fill: { fgColor: { rgb: bg } },
    font: { bold: !!bold, color: { rgb: fg }, name: 'Malgun Gothic', sz: 10 },
    alignment: { horizontal: 'right', vertical: 'center' },
    numFmt: '#,##0',
    border: {
      top:    { style:'thin', color:{ rgb:'2A3045' } },
      bottom: { style:'thin', color:{ rgb:'2A3045' } },
      left:   { style:'thin', color:{ rgb:'2A3045' } },
      right:  { style:'thin', color:{ rgb:'2A3045' } },
    }
  });

  // ── 1. 제목 ──
  addRow([
    { v:'칼라강판 지붕 자재 견적서', s: hStyle('1A1A2E', COL_HEADER_FG, true, 'center'), t:'s' },
    ...Array(6).fill({ v:'', s: hStyle('1A1A2E', COL_HEADER_FG, true, 'center'), t:'s' })
  ]);
  MERGE(R-1, 0, 6);

  // ── 2. 현장 정보 ──
  const infoStyle = hStyle('161A28', COL_WHITE, false, 'left');
  const infoLabelStyle = hStyle('161A28', COL_MUTED, true, 'left');
  addRow([
    { v:'현장명',   s: infoLabelStyle, t:'s' },
    { v: siteName,  s: infoStyle, t:'s' },
    { v:'',         s: infoStyle, t:'s' },
    { v:'현장주소', s: infoLabelStyle, t:'s' },
    { v: siteAddr,  s: infoStyle, t:'s' },
    { v:'',         s: infoStyle, t:'s' },
    { v:'',         s: infoStyle, t:'s' },
  ]);
  MERGE(R-1, 1, 2); MERGE(R-1, 4, 6);

  addRow([
    { v:'공사유형', s: infoLabelStyle, t:'s' },
    { v: workType,  s: infoStyle, t:'s' },
    { v:'',         s: infoStyle, t:'s' },
    { v:'지붕면적', s: infoLabelStyle, t:'s' },
    { v: roofArea ? roofArea + ' ㎡' : '', s: infoStyle, t:'s' },
    { v:'',         s: infoStyle, t:'s' },
    { v:'',         s: infoStyle, t:'s' },
  ]);
  MERGE(R-1, 1, 2); MERGE(R-1, 4, 6);

  addRow([
    { v:'작성일',   s: infoLabelStyle, t:'s' },
    { v: today,     s: infoStyle, t:'s' },
    { v:'',         s: infoStyle, t:'s' },
    ...Array(4).fill({ v:'', s: infoStyle, t:'s' })
  ]);
  MERGE(R-1, 1, 6);

  // 빈 행
  addRow(Array(7).fill({ v:'', s:{}, t:'s' }));

  // ── 3. 컬럼 헤더 ──
  const colHdr = hStyle(COL_HEADER_BG, COL_HEADER_FG, true, 'center');
  addRow([
    { v:'구분',     s: colHdr, t:'s' },
    { v:'자재명',   s: colHdr, t:'s' },
    { v:'규격',     s: colHdr, t:'s' },
    { v:'단위',     s: colHdr, t:'s' },
    { v:'단가(원)', s: colHdr, t:'s' },
    { v:'수량',     s: colHdr, t:'s' },
    { v:'금액(원)', s: colHdr, t:'s' },
  ]);

  // ── 4. 자재 행 (카테고리별 그룹 + 소계) ──
  const itemStyle  = (col) => hStyle('161A28', col || COL_WHITE, false, 'left');
  const itemCStyle = (col) => hStyle('161A28', col || COL_WHITE, false, 'center');

  let curCat2 = '';
  let catTotal2 = 0;
  let grandTotal2 = 0;

  rows.forEach((r, i) => {
    const isNewCat    = r.cat !== curCat2;
    const isLastOfCat = i === rows.length - 1 || rows[i + 1].cat !== r.cat;

    if (isNewCat) {
      // 이전 카테고리 소계 (첫 카테고리 제외)
      if (curCat2 !== '') {
        const subS = hStyle(COL_SUB_BG, COL_SUB_FG, true, 'right');
        addRow([
          { v:'소계', s: subS, t:'s' },
          ...Array(5).fill({ v:'', s: subS, t:'s' }),
          { v: catTotal2, s: numStyle(COL_SUB_BG, COL_SEC_FG, true), t:'n' },
        ]);
        MERGE(R-1, 0, 5);
        catTotal2 = 0;
      }
      // 섹션 헤더
      const secS = hStyle(COL_SEC_BG, COL_SEC_FG, true, 'left');
      addRow([
        { v: r.catName, s: secS, t:'s' },
        ...Array(6).fill({ v:'', s: secS, t:'s' })
      ]);
      MERGE(R-1, 0, 6);
      curCat2 = r.cat;
    }

    addRow([
      { v: r.catName, s: itemStyle(COL_MUTED), t:'s' },
      { v: r.name,    s: itemStyle(COL_WHITE), t:'s' },
      { v: r.spec,    s: itemStyle(COL_MUTED), t:'s' },
      { v: r.unit,    s: itemCStyle(COL_WHITE), t:'s' },
      { v: r.price,   s: numStyle('161A28', COL_WHITE, false), t:'n' },
      { v: r.qty,     s: numStyle('161A28', COL_WHITE, true), t:'n' },
      { v: r.total,   s: numStyle('161A28', COL_TOTAL_FG, true), t:'n' },
    ]);
    catTotal2 += r.total;
    grandTotal2 += r.total;

    // 카테고리 마지막 행이면 소계 추가
    if (isLastOfCat) {
      const subS = hStyle(COL_SUB_BG, COL_SUB_FG, true, 'right');
      addRow([
        { v:'소계', s: subS, t:'s' },
        ...Array(5).fill({ v:'', s: subS, t:'s' }),
        { v: catTotal2, s: numStyle(COL_SUB_BG, COL_SEC_FG, true), t:'n' },
      ]);
      MERGE(R-1, 0, 5);
      catTotal2 = 0;
    }
  });

  // ── 6. 합계 ──
  const vat      = Math.round(grandTotal2 * 0.1);
  const vatTotal = grandTotal2 + vat;
  addRow(Array(7).fill({ v:'', s:{}, t:'s' }));

  const totS  = hStyle(COL_TOTAL_BG, COL_TOTAL_FG, true, 'right');
  const totN  = numStyle(COL_TOTAL_BG, COL_TOTAL_FG, true);
  const vatS  = hStyle('161A28', COL_SUB_FG, true, 'right');
  const vatN  = numStyle('161A28', COL_SEC_FG, true);
  const finS  = hStyle('1A1000', 'F0C060', true, 'right');
  const finN  = numStyle('1A1000', 'F0C060', true);

  addRow([ { v:'자재비 합계', s:totS, t:'s' }, ...Array(5).fill({v:'',s:totS,t:'s'}), { v:grandTotal2, s:totN, t:'n' } ]);
  MERGE(R-1, 0, 5);
  addRow([ { v:'부가세 (10%)', s:vatS, t:'s' }, ...Array(5).fill({v:'',s:vatS,t:'s'}), { v:vat, s:vatN, t:'n' } ]);
  MERGE(R-1, 0, 5);
  addRow([ { v:'합계 (VAT 포함)', s:finS, t:'s' }, ...Array(5).fill({v:'',s:finS,t:'s'}), { v:vatTotal, s:finN, t:'n' } ]);
  MERGE(R-1, 0, 5);

  // ── 7. 워크시트 생성 ──
  const ws = XLSX.utils.aoa_to_sheet(
    data.map(row => row.map(cell => ({ v: cell.v, t: cell.t || 's' })))
  );

  // 셀 스타일 적용
  data.forEach((row, r) => {
    row.forEach((cell, c_) => {
      const addr = XLSX.utils.encode_cell({ r, c: c_ });
      if (!ws[addr]) ws[addr] = { v: cell.v, t: cell.t || 's' };
      if (cell.s) ws[addr].s = cell.s;
      if (cell.t === 'n') {
        ws[addr].t = 'n';
        ws[addr].z = '#,##0';  // 1000단위 쉼표
      }
    });
  });

  ws['!merges'] = merges;
  ws['!cols'] = [
    { wch: 12 }, // 구분
    { wch: 28 }, // 자재명
    { wch: 30 }, // 규격
    { wch: 6  }, // 단위
    { wch: 12 }, // 단가
    { wch: 8  }, // 수량
    { wch: 14 }, // 금액
  ];
  ws['!rows'] = [{ hpt: 22 }]; // 제목행 높이

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '자재견적서');

  // 면적산출 시트 추가
  const ws2 = buildAreaSheet();
  if (ws2) XLSX.utils.book_append_sheet(wb, ws2, '면적산출');

  XLSX.writeFile(wb, `칼라강판지붕_자재견적_${siteName}_${today.replace(/\./g,'-')}.xlsx`);
}

  push(['구분','자재명','규격','단위','단가(원)','수량','금액(원)'].map(v => E(v,hS)));

  let grandTotal = 0;
  rows.forEach(r => {
    if (!groups[r.cat]) groups[r.cat] = { catName: r.catName, items: [], subtotal: 0 };

  data.forEach((row, r) => {

      if (!ws[addr]) ws[addr] = { v: cell.v, t: cell.t||'s' };
      if (cell.s) ws[addr].s = cell.s;

  });
  ws['!merges'] = merges;
  ws['!cols'] = [ {wch:12},{wch:28},{wch:30},{wch:6},{wch:12},{wch:8},{wch:14} ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '자재리스트');
  XLSX.writeFile(wb, `자재리스트_${siteName}_${today.replace(/[./]/g,'-')}.xlsx`);
}

    document.getElementById('site-name').value = data.site_name||'';
    document.getElementById('site-addr').value = data.site_addr||'';
    if (data.work_type) {
      const wsel = document.getElementById('work-type');
      if (wsel) {
        // value로 시도, 안되면 텍스트로 매핑
        const textToValue = {
          '덧씌우기 (기존 지붕 위)': 'overlay',
          '철거 후 재시공': 'remove',
          'overlay': 'overlay',
          'remove': 'remove'
        };
        wsel.value = textToValue[data.work_type] || data.work_type;
      }
    }
    if (data.state_snapshot) {
      Object.keys(data.state_snapshot).forEach(function(k){
        if (state[k]) {
          const snap = data.state_snapshot[k];
          state[k].checked = !!snap.checked;
          const _qty = parseFloat(snap.qty);
          state[k].qty   = (isNaN(_qty)||!isFinite(_qty)) ? 0 : _qty;
          const _price = parseFloat(snap.price);
          state[k].price = (isNaN(_price)||!isFinite(_price)) ? state[k].price : _price;
          refreshRow(k);
        }
      });
    }
    if (data.zones && data.zones.length) {
      _zones=[]; _zoneIdCounter=0;
      document.getElementById('zones-container').innerHTML='';
      data.zones.forEach(function(z,i){
        var zid = z.id||i+1;
        _zoneIdCounter=Math.max(_zoneIdCounter,zid);
        _zones.push({id:zid,name:z.name||'',shape:z.shape||'gable',result:z.result||null});
        renderZoneCard(zid,i+1,z.shape||'gable');
        setTimeout(function(){
          // 구역명 복원
          var inp=document.getElementById('zname-'+zid);
          if(inp) inp.value=z.name||'';
          // zbody 펼치기
          var body=document.getElementById('zbody-'+zid);
          if(body) body.style.display='block';

          // 선택된 지붕 버튼만 보이고 나머지 숨기기
          var shapeRow=document.getElementById('shape-row-'+zid);
          if(shapeRow){
            shapeRow.querySelectorAll('.shape-card-btn').forEach(function(btn){
              btn.style.display = btn.dataset.shape===z.shape ? 'flex' : 'none';
            });
            // 그리드 → 단일 아이템으로 레이아웃 변경
            shapeRow.style.gridTemplateColumns = 'auto';
            shapeRow.style.justifyContent = 'flex-start';
          }

          // 입력값 복원 후 calcZone 호출 (결과 표시)
          setTimeout(function(){ calcZone(zid); }, 300);
          // 입력값 복원
          if(z.result && z.shape) {
            var r = z.result;
            var sv = function(sfx, val) {
              if(val === undefined || val === null || isNaN(val)) return;
              var el = document.getElementById('z'+zid+'-'+sfx);
              if(el) el.value = val;
            };
            var sh = z.shape;

            if(sh === 'gable') {
              // 박공: W=가로+처마*2, eave=낙수처마
              var eave = r.eave || 0;
              sv('w',    r.W ? parseFloat((r.W - eave*2).toFixed(3)) : null);
              sv('d',    r.D ? parseFloat((r.D - eave*2).toFixed(3)) : null);
              sv('eave', eave);
              sv('eave-g', r.rakeEave || 0);
              sv('wallH',  r.wallH);
              var ps = document.getElementById('z'+zid+'-pitch');
              if(ps && r.pitchLong) ps.value = r.pitchLong;

            } else if(sh === 'hip') {
              // 모임: W=가로+eaveL*2, D=세로+eaveS*2
              var eL = r.eaveL || 0;
              var eS = r.eaveS || eL;
              sv('w',     r.W ? parseFloat((r.W - eL*2).toFixed(3)) : null);
              sv('d',     r.D ? parseFloat((r.D - eS*2).toFixed(3)) : null);
              sv('eaveL', eL);
              if(!r.sameE) sv('eaveS', eS);
              sv('wallH', r.wallH);
              var ps = document.getElementById('z'+zid+'-pitch');
              if(ps && r.pitchLong) ps.value = r.pitchLong;
              if(!r.sameP) {
                var ps2 = document.getElementById('z'+zid+'-pitch2');
                if(ps2 && r.pitchShort) ps2.value = r.pitchShort;
              }

            } else if(sh === 'halfhip') {
              var eave2 = r.eave || 0;
              sv('w',     r.W ? parseFloat((r.W - eave2*2).toFixed(3)) : null);
              sv('d',     r.D ? parseFloat((r.D - eave2*2).toFixed(3)) : null);
              sv('eave',  eave2);
              sv('eave2', r.eave2 || 0);
              sv('wallH', r.wallH);
              var ps = document.getElementById('z'+zid+'-pitch');
              if(ps && r.pitchLong) ps.value = r.pitchLong;

            } else if(sh === 'shed') {
              var eaveS2 = r.eave || 0;
              sv('w',    r.W ? parseFloat((r.W - eaveS2*2).toFixed(3)) : null);
              sv('d',    r.D ? parseFloat((r.D - eaveS2*2).toFixed(3)) : null);
              sv('eave', eaveS2);
              sv('wallH', r.wallH);
              var ps = document.getElementById('z'+zid+'-pitch');
              if(ps && r.pitchLong) ps.value = r.pitchLong;

            } else if(sh === 'flat') {
              sv('w',        r.W || null);
              sv('d',        r.D || null);
              sv('parapet',  r.pH || 0);
              sv('parapetW', r.pW || 0);
              sv('eaveFt',   r.eaveFt || 0);
              sv('eaveRr',   r.eaveRr || 0);
              sv('eaveLt',   r.eaveLt || 0);
              sv('eaveRt',   r.eaveRt || 0);

            } else if(sh === 'other') {
              sv('direct-area', r.flat || r.real || null);
              sv('surcharge',   r.surchargeRate ? parseFloat(((r.surchargeRate-1)*100).toFixed(1)) : null);
            }
          }
        },150);
      });
    }
    // 지붕면적 복원
    if (data.roof_area) {
      document.getElementById('roof-area').value = data.roof_area;
      const applied = document.getElementById('roof-area-applied');
      const appliedVal = document.getElementById('applied-val');

      if (appliedVal) appliedVal.textContent = data.roof_area;
    }
    // 구역 입력값 복원 후 calcZone 재실행 → 새로 계산된 result 사용
    setTimeout(function() {
      _zones.forEach(function(z) {
        calcZone(z.id);
      });
      setTimeout(function() {
        const validZones = _zones.filter(function(z){ return z.result; });
        if (validZones.length > 0) {
          updateZoneSectionBadges(validZones);
          autoCalcQty(validZones);
        }
        calcAll();
      }, 200);
    }, 400);
    closeEstimateModal();
    toast('불러옴: '+data.site_name,'ok');
  } catch(e) { toast('불러오기 실패: '+e.message,'err'); }
}

<!-- 견적 이력 모달 -->
<div id="estimate-modal" style="display:none;position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,0.6);overflow-y:auto;padding:30px 16px;">
  <div style="max-width:820px;margin:0 auto;background:#fff;border:1px solid #ccc;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.2);">
    <div style="background:#cc0000;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;">
      <div style="font-size:16px;font-weight:800;color:#fff;">&#128194; 저장된 견적 이력</div>
      <button onclick="closeEstimateModal()" style="background:transparent;border:1px solid rgba(255,255,255,0.5);color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:14px;">&#x2715;</button>
    </div>
    <div style="padding:16px 20px;">
      <div style="display:grid;grid-template-columns:1fr 90px 70px 110px 90px 36px;gap:8px;padding:6px 14px;font-size:11px;color:#555;border-bottom:2px solid #eee;margin-bottom:6px;">
        <span>현장명</span><span>공사유형</span><span style="text-align:right">면적</span><span style="text-align:right">자재비</span><span style="text-align:right">작성일</span><span></span>
      </div>
      <div id="estimate-list" style="display:flex;flex-direction:column;gap:5px;max-height:460px;overflow-y:auto;">
        <div style="color:#555;text-align:center;padding:20px;">불러오는 중...</div>
      </div>
    </div>
  </div>
</div>
<style>
.est-row{display:grid;grid-template-columns:1fr 90px 70px 110px 90px 36px;gap:8px;align-items:center;padding:9px 14px;background:#fff;border:1px solid #eee;border-radius:8px;cursor:pointer;font-size:13px;}
.est-row:hover{background:#fff8f8;border-color:#cc0000;}
.est-site{font-weight:700;color:#111;}
.est-type{color:#555;font-size:12px;}
.est-area{text-align:right;color:#111;font-size:12px;}
.est-total{text-align:right;font-weight:700;color:#cc0000;}
.est-date{text-align:right;color:#888;font-size:11px;}
.btn-del-est{background:#fee;border:1px solid #fcc;color:#c00;cursor:pointer;border-radius:4px;padding:2px 4px;}
.btn-del-est:hover{background:#fdd;}
</style>

<!-- 토스트 알림 -->
<div id="supa-toast" style="display:none;position:fixed;bottom:24px;right:24px;z-index:2147483647;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:700;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-family:'Noto Sans KR',sans-serif;"></div>

</body>
</html>
