
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>칼라강판 지붕 자재 리스트 견적서</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface2: #f2f2f2;
    --border: #cccccc;
    --accent: #cc0000;
    --accent2: #ff3300;
    --blue: #1a5fb4;
    --green: #1a7a3c;
    --red: #cc0000;
    --text: #111111;
    --muted: #111111;
    --cat1: #cc0000;
    --cat2: #1a5fb4;
    --cat3: #1a7a3c;
    --cat4: #7a3c99;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  .header {
    background: #ffffff;
    border-bottom: 2px solid #cccccc;
    padding: 20px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-icon {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .header-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .btn-export {
    background: var(--accent);
    color: #ffffff;
    border: none;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .btn-export:hover { background: var(--accent2); transform: translateY(-1px); }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* PROJECT INFO */
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .field-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); }
  select.field-input option { background: var(--surface2); }

  /* CATEGORY TABS */
  .cat-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .cat-tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .cat-tab:hover { border-color: var(--accent); color: var(--text); }
  .cat-tab.active { color: #000; font-weight: 700; }
  .cat-tab[data-cat="1"].active { background: var(--cat1); border-color: var(--cat1); }
  .cat-tab[data-cat="2"].active { background: var(--cat2); border-color: var(--cat2); }
  .cat-tab[data-cat="3"].active { background: var(--cat3); border-color: var(--cat3); }
  .cat-tab[data-cat="4"].active { background: var(--cat4); border-color: var(--cat4); }
  .cat-badge {
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
  }

  /* SECTION */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .section-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-title { font-size: 14px; font-weight: 700; flex: 1; }
  .section-toggle { color: var(--muted); font-size: 16px; transition: transform 0.2s; }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }
  .section-body { padding: 0; }
  .section.collapsed .section-body { display: none; }

  /* SUBSECTION */
  .subsection { border-bottom: 1px solid var(--border); }
  .subsection:last-child { border-bottom: none; }
  .subsection-label {
    padding: 10px 20px 6px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: rgba(255,255,255,0.02);
  }

  /* ITEM ROW */
  .item-row {
    display: grid;
    grid-template-columns: 32px 1fr 90px 80px 100px 100px 36px;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    border-bottom: 1px solid #eeeeee;
    transition: background 0.15s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: rgba(255,255,255,0.03); }
  .item-row.header-row {
    background: rgba(255,255,255,0.04);
    padding: 8px 16px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
  }

  .check-box {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    transition: all 0.15s;
    position: relative;
  }
  .check-box:checked {
    background: var(--green);
    border-color: var(--green);
  }
  .check-box:checked::after {
    content: '✓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
  }

  .item-name { font-size: 13px; font-weight: 500; }
  .item-name small { display: block; font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 1px; }

  .item-qty, .item-unit, .item-price, .item-total {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    text-align: right;
    width: 100%;
    transition: border-color 0.2s;
  }
  .item-qty:focus, .item-price:focus { border-color: var(--accent); }
  .item-unit {
    background: transparent;
    border-color: transparent;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    cursor: default;
    padding: 6px 6px;
  }
  .item-total {
    background: transparent;
    border-color: transparent;
    color: var(--accent2);
    font-weight: 600;
    cursor: default;
  }
  .item-total.zero { color: var(--muted); }

  .btn-del {
    width: 28px; height: 28px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-del:hover { background: var(--red); border-color: var(--red); color: #fff; }

  /* SUMMARY */
  .summary-bar {
    background: linear-gradient(135deg, var(--surface) 0%, #1a2035 100%);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: 14px;
    padding: 20px 24px;
    margin-top: 24px;
    background: #ffffff;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid #cccccc;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
  }
  .sum-item { text-align: center; }
  .sum-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .sum-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: #111111; }
  .sum-value.total { font-size: 24px; color: #cc0000; }
  .sum-value small { font-size: 12px; color: var(--muted); font-weight: 400; }

  /* ADD ITEM */
  .add-area {
    padding: 12px 16px;
    border-top: 1px dashed var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .add-name-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
  }
  .add-name-input:focus { border-color: var(--blue); }
  .btn-add-item {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-add-item:hover { background: #6ab0ff; }

  /* MODAL / PRINT */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .no-print { display: none !important; }
    body { background: #fff !important; color: #111 !important; font-size: 11px; }
    .print-only-info { display: block !important; }
    .header { background: #1a1f30 !important; color: #fff !important; border-bottom: 3px solid #e8a020 !important; padding: 12px 20px; position: static; }
    .header-title { color: #fff !important; font-size: 15px; }
    .header-sub { color: #111111 !important; }
    .header-icon { background: #e8a020 !important; }
    .container { padding: 10px; max-width: 100%; }
    .project-card { background: #f5f5f5 !important; border: 1px solid #ccc !important; border-radius: 6px 6px 0 0 !important; margin-bottom: 0 !important; }
    .roof-calc-card { background: #f9f9f9 !important; border: 1px solid #ccc !important; border-top: none !important; border-radius: 0 0 6px 6px !important; margin-bottom: 12px !important; }
  .shape-card-row { background: #f5f5f5 !important; border-bottom: 1px solid #ddd !important; }
  .shape-card-btn { border-color: #ccc !important; background: #fff !important; }
  .shape-card-btn.active { border-color: #e8a020 !important; }
  .shape-card-svg { color: #555 !important; }
  .shape-card-btn.active .shape-card-svg { color: #e8a020 !important; }
    .roof-calc-result { background: #f0f0f0 !important; border: 1px solid #ddd !important; }
    .roof-result-label { color: #555 !important; }
    .roof-result-val { color: #111 !important; }
    .roof-result-divider { background: #ccc !important; }
    .roof-area-applied { background: #f0fff0 !important; border-color: #3dba7a !important; }
    .field-label { color: #555 !important; }
    .field-input { background: #fff !important; border: 1px solid #ccc !important; color: #111 !important; }
    /* ROOF CALC CARD */
  .roof-calc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 14px 14px;
    padding: 16px 24px 20px;
    margin-bottom: 20px;
  }
  .roof-calc-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .roof-calc-inputs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }
  .roof-calc-result {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
  }
  .roof-result-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px;
    gap: 4px;
  }
  .roof-result-row.highlight .roof-result-label { color: var(--accent); }
  .roof-result-row.highlight .roof-result-val { color: var(--accent); font-size: 18px; }
  .roof-result-row.highlight2 .roof-result-label { color: var(--accent2); }
  .roof-result-row.highlight2 .roof-result-val { color: var(--accent2); font-size: 20px; }
  .roof-result-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .roof-result-label small { font-size: 10px; color: var(--muted); display: block; }
  .roof-result-val { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text); white-space: nowrap; }
  .roof-result-divider { width: 1px; height: 40px; background: var(--border); flex-shrink: 0; }
  .btn-apply-area {
    margin-left: auto;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-apply-area:hover { background: #4fd090; transform: translateY(-1px); }
  .roof-area-applied {
    background: rgba(61,186,122,0.1);
    border: 1px solid rgba(61,186,122,0.3);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-reset-area {
    margin-left: auto;
    background: transparent;
    border: 1px solid #111111;
    color: #111111;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .btn-reset-area:hover { border-color: var(--accent); color: var(--accent); }

  /* ROOF SHAPE SELECTOR */
  .roof-shape-selector {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .shape-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 6px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .shape-btn:hover { border-color: var(--accent); background: rgba(232,160,32,0.06); }
  .shape-btn.active { border-color: var(--accent); background: rgba(232,160,32,0.13); }
  .shape-icon { font-size: 22px; line-height: 1; }
  .shape-name { font-size: 12px; font-weight: 700; color: var(--text); }
  .shape-btn.active .shape-name { color: var(--accent); }
  .shape-sub { font-size: 10px; color: var(--muted); text-align: center; line-height: 1.3; }
  .shape-desc-bar {
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 12px;
    margin-bottom: 12px;
    min-height: 34px;
    line-height: 1.6;
  }
  .shape-desc-bar b { color: var(--accent); }

  /* ZONE SYSTEM */
  .btn-add-zone {
    background: rgba(196,111,255,0.15);
    border: 1px solid rgba(196,111,255,0.4);
    color: #c46fff;
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.18s;
  }
  .btn-add-zone:hover { background: rgba(196,111,255,0.28); }

  .zone-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .zone-card:hover { border-color: rgba(232,160,32,0.4); }

  .zone-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .zone-num {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: var(--accent);
    color: #ffffff;
    font-size: 12px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .zone-name-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    width: 160px;
    padding: 2px 4px;
  }
  .zone-name-input:focus { border-bottom-color: var(--accent); }
  .zone-shape-row {
    display: flex;
    gap: 6px;
    flex: 1;
  }
  .zone-shape-tab {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .zone-shape-tab:hover { border-color: var(--accent); color: var(--text); }
  .zone-shape-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .btn-del-zone {
    margin-left: auto;
    background: transparent;
    border: 1px solid #111111;
    color: #ffffff;
    width: 26px; height: 26px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-del-zone:hover { background: var(--red); border-color: var(--red); color: #fff; }

  .zone-body { padding: 12px 14px; }
  .zone-desc { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .zone-inputs {
    display: grid;
    gap: 10px;
    margin-bottom: 10px;
  }
  /* SHAPE CARD GRID */
  .shape-card-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    padding: 12px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .shape-card-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 6px 8px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: 'Noto Sans KR', sans-serif;
    position: relative;
    overflow: hidden;
  }
  .shape-card-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(232,160,32,0.05));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .shape-card-btn:hover {
    border-color: rgba(232,160,32,0.5);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .shape-card-btn:hover::before { opacity: 1; }
  .shape-card-btn.active {
    border-color: var(--accent);
    background: rgba(232,160,32,0.08);
    box-shadow: 0 0 0 1px var(--accent), 0 6px 20px rgba(232,160,32,0.2);
  }
  .shape-card-svg {
    width: 64px;
    height: 48px;
    color: var(--muted);
    transition: color 0.18s;
  }
  .shape-card-btn:hover .shape-card-svg { color: var(--text); }
  .shape-card-btn.active .shape-card-svg { color: var(--accent); }
  .shape-card-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    transition: color 0.18s;
    white-space: nowrap;
  }
  .shape-card-btn:hover .shape-card-name { color: var(--text); }
  .shape-card-btn.active .shape-card-name { color: var(--accent); }
  .shape-card-sub {
    font-size: 9px;
    color: var(--muted);
    opacity: 0.7;
    text-align: center;
    line-height: 1.3;
  }
  .shape-card-btn.active .shape-card-sub { opacity: 1; color: rgba(232,160,32,0.7); }

  .zone-result {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    flex-wrap: wrap;
  }
  .zr-item { display: flex; flex-direction: column; align-items: center; padding: 0 10px; }
  .zr-label { font-size: 10px; color: var(--muted); }
  .zr-val { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--text); }
  .zr-val.accent { color: var(--accent); }
  .zr-val.accent2 { color: var(--accent2); }

const SHAPE_DEFS = {
  gable: {
    name:'박공지붕',
    desc:'앞뒤 2면 경사 · 용마루 있음 · 낙수처마(앞뒤)/박공내밀기(측면) 분리 입력',
    // 공식:
    //   낙수면 실면적   = (가로 + 박공내밀기×2) × (세로 + 낙수처마×2) × 경사계수
    //   박공 오버행     = 박공내밀기(eG) × 마루높이(H) × 2  (좌우 삼각형)
    //     마루높이 H    = (세로/2 + 낙수처마) × (치수/10)
    //   총 실면적       = 낙수면 + 박공 오버행
    //   용마루 길이     = 가로 + 박공내밀기×2
    fields(zid){ return [
      { id:`z${zid}-w`,      label:'가로 (m)',                        ph:'예) 10.0' },
      { id:`z${zid}-d`,      label:'세로 (m)',                        ph:'예) 8.0' },
      { id:`z${zid}-pitch`,  label:'경사도 (치)',                     type:'select' },
      { id:`z${zid}-eave`,   label:'낙수처마 (m) — 앞뒤 경사방향',   ph:'예) 0.5' },
      { id:`z${zid}-eave-g`, label:'박공내밀기 (m) — 측면 비바라기', ph:'예) 0.3' },
      { id:`z${zid}-wallH`,   label:'외벽 높이 (m, 처마도리까지) — 선택',    ph:'예) 3.0', opt:true },
    ]},
    calc(zid){
      const w=n(`z${zid}-w`), d=n(`z${zid}-d`), p=n(`z${zid}-pitch`);
      const eL = n(`z${zid}-eave`);    // 낙수처마 (앞뒤, 경사방향)
      const eG = n(`z${zid}-eave-g`);  // 박공 내밀기 (측면)
      if(!w||!d||!p) return null;
      const f = pf(p);
      const W = w + eG*2;              // 가로 + 박공내밀기×2
      const D = d + eL*2;              // 세로 + 낙수처마×2
      const flat = W * D;
      // 낙수면 실면적 (경사는 세로 방향만)
      const slopeArea = flat * f;
      // 박공 오버행: 마루높이 H = (d/2 + eL) × (치/10)
      const H = (d/2 + eL) * (p/10);
      const rakeArea = eG > 0 ? eG * H * 2 : 0;  // 좌우 삼각형 2개
      const real = slopeArea + rakeArea;
      const factor = parseFloat((real / flat).toFixed(4));
      const ridgeLen = W;  // 용마루 = 가로 + 박공내밀기×2
      const wallH_g = parseFloat(document.getElementById(`z${zid}-wallH`)?.value)||0;
      const eavH_g = parseFloat(((d/2+eL)*(p/10)).toFixed(3));
      return { flat, factor, real, surchargeRate:1.1,
               W, D, ridgeLen, ridgeType:'박공',
               slopeLen: parseFloat(((D/2)*pf(p)).toFixed(3)),
               slopeWidth: W, faceCount: 2,
               eave: eL, rakeEave: eG,
               pitchLong: p,
               slopeArea: parseFloat(slopeArea.toFixed(3)),
               rakeArea:  parseFloat(rakeArea.toFixed(3)),
               eavH: eavH_g,
               wallH: wallH_g>0 ? wallH_g : null,
               ridgeH: wallH_g>0 ? parseFloat((wallH_g+eavH_g).toFixed(3)) : null };
    }
  },
  hip: {

    // ── 추녀마루 2종 계산 (경사도가 다를 때) ──
    //
    // 좌표계: 건물 중심 = 원점, W=가로(처마포함), D=세로(처마포함)
    //   처마 모서리 4개: (±W/2, ±D/2, 0)
    //   용마루 끝점 2개: (±ridgeLen/2, 0, H)  ← ridgeLen = W-D
    //
    // 경사도가 같을 때(pL=pS):
    //   H = (D/2)×(p/10), 추녀마루 4개 모두 동일
    //   hipLen = √((D/2)²+(D/2)²+H²)
    //
    // 경사도가 다를 때(pL≠pS):
    //   긴면(사다리꼴) H_L = (D/2)×(pL/10)  ← 긴면 경사 기준 마루높이
    //   짧은면(삼각형) H_S = (D/2)×(pS/10)  ← 짧은면 경사 기준 마루높이
    //   단, 용마루는 수평 직선이어야 하므로 H는 하나만 존재
    //   → 실제 시공: 낮은 쪽 H를 채택, 높은 쪽은 그에 맞춰 실효 경사도가 결정됨
    //
    //   [추녀마루 A: 긴면 모서리 ×2]  (사다리꼴 귀)
    //     처마모서리 (W/2, D/2, 0) → 용마루끝 (ridgeLen/2, 0, H)
    //     수평x = W/2 - ridgeLen/2 = D/2
    //     수평y = D/2
    //     수직  = H
    //     hipA = √((D/2)²+(D/2)²+H²)
    //
    //   [추녀마루 B: 짧은면 모서리 ×2]  (삼각형 귀)
    //     처마모서리 (W/2, D/2, 0) → 용마루끝 (ridgeLen/2, 0, H) ← 동일 끝점!
    //     hipB = hipA  (같은 꼭짓점을 공유하므로 동일)
    //
    //   ∴ 용마루가 있는 직사각 모임지붕에서 추녀마루는 항상 4개 동일
    //      경사도가 달라도 마루높이 H가 결정되면 추녀마루 길이는 동일
    //
    // 따라서 경사도별로 표시할 항목:
    //   - 긴면 기준 H_L, 짧은면 기준 H_S → 둘 다 표시
    //   - 실제 채택 H = min(H_L, H_S) 또는 사용자 선택
    //   - 추녀마루 = √((D/2)²+(D/2)²+H²) — m 단위
    fields(zid){ return [
      { id:`z${zid}-w`,      label:'가로 (m, 긴방향)',                         ph:'예) 10.0' },
      { id:`z${zid}-d`,      label:'세로 (m, 짧은방향)',                       ph:'예) 8.0' },
      { id:`z${zid}-pitch`,  label:'긴면 경사도 (치)',                         type:'select' },
      { id:`z${zid}-pitch2`, label:'짧은면 경사도 (치) — 동일하면 비워두세요', type:'select2' },
      { id:`z${zid}-eaveL`,  label:'긴면 처마 (m, 앞뒤)',                     ph:'예) 0.5' },
      { id:`z${zid}-eaveS`,  label:'짧은면 처마 (m, 좌우) — 동일하면 비워두세요', type:'eaveS' },
      { id:`z${zid}-wallH`,   label:'외벽 높이 (m, 처마도리까지) — 선택', ph:'예) 3.0' },
    ]},
    calc(zid){
      const w=n(`z${zid}-w`), d=n(`z${zid}-d`);
      const eL = n(`z${zid}-eaveL`);                                      // 긴면(앞뒤) 처마
      const eS_raw = document.getElementById(`z${zid}-eaveS`)?.value;
      const eS = (eS_raw===''||eS_raw===null||eS_raw===undefined) ? eL    // 비우면 긴면과 동일
               : (parseFloat(eS_raw)||0);
      const pL = parseFloat(document.getElementById(`z${zid}-pitch`)?.value)  || 0;
      const p2 = parseFloat(document.getElementById(`z${zid}-pitch2`)?.value);
      const pS = (!p2 || isNaN(p2)) ? pL : p2;
      const sameP = (pL === pS);
      const sameE = (eL === eS);
      if(!w||!d||!pL) return null;
      const W=w+eL*2, D=d+eS*2;
      const flat=W*D;
      const fS=pf(pS);

      // 마루높이: 두 경사 각각 계산
      const H_L = (D/2) * (pL/10);   // 긴면 경사 기준 마루높이 (m)
      const H_S = (D/2) * (pS/10);   // 짧은면 경사 기준 마루높이 (m)
      // 실제 채택 H = 낮은 쪽 (용마루는 낮은 경사에 맞춰 결정)
      const H = Math.min(H_L, H_S);

      // 면적 계산
      const longSlope  = Math.sqrt(Math.pow(D/2,2) + H_L*H_L);  // 긴면 빗면 (긴면 경사 H_L 기준)
      const shortSlope = (D/2) * fS;                              // 짧은면 빗면 (짧은면 경사계수)
      const ridgeLen = Math.max(0, W-D);
      const trapArea = (W + ridgeLen) / 2 * longSlope * 2;
      const triArea  = D * shortSlope;
      const real = trapArea + triArea;
      const factor = parseFloat((real/flat).toFixed(4));

      // 추녀마루 (m)
      // 경사 동일: 4개 모두 = √((D/2)²+(D/2)²+H²)
      // 경사 다름: H_L 기준 2개(긴면쪽), H_S 기준 2개(짧은면쪽)
      const hipLen   = Math.sqrt(Math.pow(D/2,2) + Math.pow(D/2,2) + H*H);   // 채택H 기준
      const hipLen_L = Math.sqrt(Math.pow(D/2,2) + Math.pow(D/2,2) + H_L*H_L); // 긴면H 기준
      const hipLen_S = Math.sqrt(Math.pow(D/2,2) + Math.pow(D/2,2) + H_S*H_S); // 짧은면H 기준

      // 강판 장수용 빗면 길이
      const longSlopeLen  = parseFloat(longSlope.toFixed(3));   // 긴면 빗면
      const shortSlopeLen = parseFloat(shortSlope.toFixed(3));  // 짧은면 빗면
      return {
        flat, factor, real, surchargeRate:1.1, W, D,
        longSlopeLen, shortSlopeLen,  // 강판 길이
        ridgeLen:  parseFloat(ridgeLen.toFixed(3)),
        ridgeType: '모임',
        hipLen:    parseFloat(hipLen.toFixed(3)),
        hipLen_L:  parseFloat(hipLen_L.toFixed(3)),
        hipLen_S:  parseFloat(hipLen_S.toFixed(3)),
        hipCount: 4,
        H_L: parseFloat(H_L.toFixed(3)),
        H_S: parseFloat(H_S.toFixed(3)),
        H:   parseFloat(H.toFixed(3)),
        pitchLong: pL, pitchShort: pS, sameP,
        eaveL: parseFloat(eL.toFixed(3)),
        eaveS: parseFloat(eS.toFixed(3)),
        sameE,
        eavH: parseFloat(H.toFixed(3)),
        wallH: (() => { const v=parseFloat(document.getElementById(`z${zid}-wallH`)?.value); return isNaN(v)?null:v; })(),
        ridgeH: (() => { const v=parseFloat(document.getElementById(`z${zid}-wallH`)?.value); return isNaN(v)||!v ? null : parseFloat((v+H).toFixed(3)); })()
      };
    }
  },

    fields(zid){ return [
      { id:`z${zid}-w`,       label:'가로 (m)',        ph:'예) 10.0' },
      { id:`z${zid}-d`,       label:'세로 (m)',        ph:'예) 8.0' },
      { id:`z${zid}-eaveFt`,  label:'앞 처마 (m)',     ph:'예) 0.5' },
      { id:`z${zid}-eaveRr`,  label:'뒤 처마 (m)',     ph:'예) 0.5', opt:true },
      { id:`z${zid}-eaveLt`,  label:'좌 처마 (m)',     ph:'예) 0.5', opt:true },
      { id:`z${zid}-eaveRt`,  label:'우 처마 (m)',     ph:'예) 0.5', opt:true },
      { id:`z${zid}-parapet`, label:'파라펫 높이 (m)', ph:'예) 0.3', opt:true },
      { id:`z${zid}-parapetW`, label:'파라펫 두께 (m)', ph:'예) 0.2', opt:true },
    ]},
    calc(zid){
      const w=n(`z${zid}-w`), d=n(`z${zid}-d`);
      if(!w||!d) return null;
      const eFt = n(`z${zid}-eaveFt`) || 0;  // 앞처마
      const eRr = n(`z${zid}-eaveRr`) || 0;  // 뒤처마
      const eLt = n(`z${zid}-eaveLt`) || 0;  // 좌처마
      const eRt = n(`z${zid}-eaveRt`) || 0;  // 우처마
      const pH  = n(`z${zid}-parapet`)  || 0;  // 파라펫 높이
      const pW  = n(`z${zid}-parapetW`) || 0;  // 파라펫 두께
      const W = w + eFt + eRr;  // 처마 포함 가로
      const D = d + eLt + eRt;  // 처마 포함 세로
      const floorArea    = W * D;
      // 파라펫 내측 방수면적 (내측 둘레 × 높이)
      const parapetArea  = pH > 0 ? (W + D) * 2 * pH : 0;
      // 파라펫 상단 마감면적 (두께 × 둘레)
      const parapetTopArea = (pH > 0 && pW > 0) ? (W + D) * 2 * pW : 0;
      const real = floorArea + parapetArea + parapetTopArea;
      const flat = floorArea;
      const hasEave = eFt||eRr||eLt||eRt;
      return {
        flat, factor: parseFloat((real/flat).toFixed(4)),
        real, surchargeRate:1.05, W, D,
        floorArea: parseFloat(floorArea.toFixed(3)),
        parapetArea: parseFloat(parapetArea.toFixed(3)),
        parapetTopArea: parseFloat(parapetTopArea.toFixed(3)),
        eaveFt:eFt, eaveRr:eRr, eaveLt:eLt, eaveRt:eRt, pH, pW, hasEave
      };
    }
  },
  other: {
    name:'기타지붕',
    desc:'수치 직접 입력 · 실면적 및 할증 직접 지정',
    fields(zid){ return [
      { id:`z${zid}-direct-area`, label:'실제 지붕면적 (㎡)', ph:'예) 85.5', type:'direct' },
      { id:`z${zid}-surcharge`,   label:'할증률 (%)', ph:'예) 10', type:'direct' },
      { id:`z${zid}-memo`,        label:'메모 (지붕 형태 설명)', ph:'예) L자형 복합지붕', type:'memo' },
    ]},
    calc(zid){
      const area=parseFloat(document.getElementById(`z${zid}-direct-area`)?.value)||0;
      const pct=parseFloat(document.getElementById(`z${zid}-surcharge`)?.value);
      const rate=isNaN(pct)?1.1:1+pct/100;
      if(!area) return null;
      return { flat:area, factor:rate, real:area, surchargeRate:rate, isOther:true };
    }
  }
};

function n(id){ return parseFloat(document.getElementById(id)?.value)||0; }
function pf(p){ return Math.sqrt(1+Math.pow(p/10,2)); }

function addZone(shape) {
  shape = shape || 'gable';
  const id = ++_zoneIdCounter;
  const zoneNum = _zones.length + 1;
  _zones.push({ id, shape, result: null });
  renderZoneCard(id, zoneNum, shape);
  // 첫 구역은 기본 선택된 지붕 모양 body 자동 펼침
  const defaultBtn = document.querySelector(`#zone-card-${id} .shape-card-btn.active`);
  if (defaultBtn) {
    const body = document.getElementById(`zbody-${id}`);
    if (body) { body.style.display = 'block'; renderZoneInputs(id, shape); }
  }
  recalcTotal();
}

function renderZoneCard(id, num, shape) {
  const container = document.getElementById('zones-container');
  const div = document.createElement('div');
  div.className = 'zone-card';
  div.id = `zone-card-${id}`;

  const tabsHtml = SHAPE_TABS.map(t => `
    <button class="shape-card-btn ${t.key===shape?'active':''}" data-shape="${t.key}"
      onclick="changeZoneShape(${id},'${t.key}',this)" title="${t.label}">
      <div class="shape-card-svg">${SHAPE_SVGS[t.key]}</div>
      <div class="shape-card-name">${t.label}</div>
      <div class="shape-card-sub">${t.sub}</div>
    </button>`
  ).join('');

  div.innerHTML = `
    <div class="zone-header">
      <div class="zone-num">${num}</div>
      <input class="zone-name-input" id="zname-${id}" placeholder="구역명 (예: 본채)" oninput="">
      <button class="btn-del-zone" onclick="removeZone(${id})" title="구역 삭제">✕</button>
    </div>
    <div class="shape-card-row" id="shape-row-${id}">${tabsHtml}</div>
    <div class="zone-body" id="zbody-${id}" style="display:none">
      <div class="zone-desc" id="zdesc-${id}"></div>
      <div class="zone-inputs" id="zinputs-${id}"></div>
      <div class="zone-result" id="zresult-${id}" style="display:none"></div>
    </div>`;
  container.appendChild(div);
  renderZoneInputs(id, shape);
}

function renderZoneInputs(id, shape) {
  const def = SHAPE_DEFS[shape];
  document.getElementById(`zdesc-${id}`).innerHTML = `<b style="color:var(--accent)">${def.name}</b> · ${def.desc}`;
  const cont = document.getElementById(`zinputs-${id}`);
  const fields = def.fields(id);
  const cols = Math.min(fields.length, 5);
  cont.style.gridTemplateColumns = `repeat(${cols},1fr)`;
  cont.innerHTML = fields.map(f => {
    if (f.type==='select')  return `<div class="field-group"><div class="field-label">${f.label}</div>${pitchSelectHtml(id)}</div>`;
    if (f.type==='select2') return `<div class="field-group" style="grid-column:span 2"><div class="field-label">${f.label}</div>${pitchSelect2Html(id)}</div>`;
    if (f.type==='memo')    return `<div class="field-group" style="grid-column:span 2"><div class="field-label">${f.label}</div><input class="field-input" id="${f.id}" type="text" placeholder="${f.ph}" style="font-size:12px"></div>`;
    if (f.type==='direct')  return `<div class="field-group"><div class="field-label">${f.label}</div><input class="field-input" id="${f.id}" type="number" min="0" step="0.01" placeholder="${f.ph}" oninput="calcZone(${id})"></div>`;
    // opt 필드: 버튼으로 접고 펼치기
    if (f.opt) {
      const toggleId = `${f.id}-toggle`;
      const wrapperId = `${f.id}-wrap`;
      return `
        <div class="field-group" id="${wrapperId}" style="position:relative;">
          <div class="field-label" style="display:flex;align-items:center;gap:4px;">
            ${f.label}
            <button type="button" id="${toggleId}"
              onclick="toggleOptField('${f.id}')"
              style="font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid #3a4060;background:#ffffff;color:#111111;cursor:pointer;line-height:1.4;">+</button>
          </div>
          <input class="field-input" id="${f.id}" type="number" min="0" step="0.1"
            placeholder="${f.ph}" oninput="calcZone(${id})"
            style="display:none;">
        </div>`;
    }
    return `<div class="field-group"><div class="field-label">${f.label}</div><input class="field-input" id="${f.id}" type="number" min="0" step="0.1" placeholder="${f.ph}" oninput="calcZone(${id})"></div>`;
  }).join('');
}

function toggleOptField(fieldId) {
  const input = document.getElementById(fieldId);
  const btn   = document.getElementById(`${fieldId}-toggle`);
  if (!input) return;
  const isHidden = input.style.display === 'none';
  input.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? '−' : '+';
  btn.style.color = isHidden ? '#c46fff' : '#7a8099';
  btn.style.borderColor = isHidden ? '#c46fff' : '#3a4060';
  if (!isHidden) { input.value = ''; const zid = input.id.match(/^z(\d+)/)?.[1]; if(zid) calcZone(zid); }
}

function changeZoneShape(id, shape, el) {
  const zone = _zones.find(z=>z.id===id);
  if (!zone) return;
  const isSame = (zone.shape === shape);
  zone.shape = shape;
  zone.result = null;
  document.querySelectorAll(`#zone-card-${id} .shape-card-btn`).forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const body = document.getElementById(`zbody-${id}`);
  // 같은 카드 다시 클릭 → 토글 접기/펼치기
  if (isSame && body.style.display !== 'none') {
    body.style.display = 'none';
  } else {
    body.style.display = 'block';
    renderZoneInputs(id, shape);
    document.getElementById(`zresult-${id}`).style.display='none';
  }
  recalcTotal();
}


function makeEwSelect(id, zoneId, ewVal) {
  return '<select id="'+id+'" style="font-size:10px;background:#f0f0f0;color:#111111;border:1px solid #cccccc;border-radius:4px;padding:1px 4px" onchange="calcZone(\''+zoneId+'\')">'+
    '<option value="700"'+(ewVal===700?' selected':'')+'>폭 700mm</option>'+
    '<option value="720"'+(ewVal===720?' selected':'')+'>폭 720mm</option>'+
    '<option value="914"'+(ewVal===914?' selected':'')+'>폭 914mm</option>'+
    '<option value="600"'+(ewVal===600?' selected':'')+'>폭 600mm</option>'+
    '<option value="500"'+(ewVal===500?' selected':'')+'>폭 500mm</option>'+
    '<option value="400"'+(ewVal===400?' selected':'')+'>폭 400mm</option>'+
    '<option value="333"'+(ewVal===333?' selected':'')+'>폭 333mm</option>'+

}
function makeSlSelect(id, zoneId, slVal) {
  return '<select id="'+id+'" style="font-size:10px;background:#f0f0f0;color:#111111;border:1px solid #cccccc;border-radius:4px;padding:1px 4px" onchange="calcZone(\''+zoneId+'\')">'+
    '<option value="3600"'+(slVal===3600?' selected':'')+'>길이 3.6m</option>'+
    '<option value="4500"'+(slVal===4500?' selected':'')+'>길이 4.5m</option>'+
    '<option value="6000"'+(slVal===6000?' selected':'')+'>길이 6.0m</option>'+
    '<option value="7200"'+(slVal===7200?' selected':'')+'>길이 7.2m</option>'+
    '<option value="9000"'+(slVal===9000?' selected':'')+'>길이 9.0m</option>'+
  '</select>';
}

function calcZone(id) {
  const zone = _zones.find(z=>z.id===id);
  if (!zone) return;
  const result = SHAPE_DEFS[zone.shape].calc(id);
  zone.result = result;
  const el = document.getElementById(`zresult-${id}`);
  if (!result) { el.style.display='none'; recalcTotal(); return; }
  const surcharge = result.real * result.surchargeRate;
  const pctNum = Math.round((result.surchargeRate - 1) * 100);
  const pct = pctNum + '%';
  const showFactor = zone.shape !== 'flat' && !result.isOther;
  el.style.display='flex';
  if (result.isOther) {
    el.innerHTML = `
      <div class="zr-item"><div class="zr-label">입력 면적</div><div class="zr-val accent">${(result.real||0).toFixed(2)} ㎡</div></div>
      <div class="zr-div"></div>
      <div class="zr-item"><div class="zr-label">할증(${pct}) 적용</div><div class="zr-val accent2">${(surcharge||0).toFixed(2)} ㎡</div></div>
      <div class="zr-div"></div>
      <div class="zr-item"><div class="zr-label">입력방식</div><div class="zr-val" style="font-size:11px;color:var(--muted)">직접입력</div></div>`;
  } else {
    // 용마루
    // 박공 오버행 분리 표시
    const rakeHtml = (result.rakeArea > 0)
      ? `<div class="zr-div"></div>
         <div class="zr-item" style="min-width:80px">
           <div class="zr-label">낙수면</div>
           <div class="zr-val" style="font-size:11px;color:var(--muted)">${result.slopeArea.toFixed(2)} ㎡</div>
         </div>
         <div class="zr-div"></div>
         <div class="zr-item" style="min-width:80px">
           <div class="zr-label">박공오버행</div>
           <div class="zr-val" style="font-size:11px;color:var(--muted)">+${result.rakeArea.toFixed(2)} ㎡</div>
         </div>`
      : '';
    // 평지붕 처마 정보
    const eaveInfoHtml = (result.hasEave)
      ? `<div class="zr-div"></div>
         <div class="zr-item" style="min-width:130px">
           <div class="zr-label" style="font-size:10px;">처마 앞${result.eaveFt||0}·뒤${result.eaveRr||0}·좌${result.eaveLt||0}·우${result.eaveRt||0}m</div>
           <div class="zr-val" style="font-size:11px;color:var(--accent)">포함 ${result.W.toFixed(2)}×${result.D.toFixed(2)} m</div>
         </div>`
      : '';
    // 평지붕 바닥+파라펫 분리 표시
    const parapetHtml = (result.parapetArea > 0)
      ? `<div class="zr-div"></div>
         <div class="zr-item" style="min-width:80px">
           <div class="zr-label">바닥면</div>
           <div class="zr-val" style="font-size:11px;color:var(--muted)">${result.floorArea.toFixed(2)} ㎡</div>
         </div>
         <div class="zr-div"></div>
         <div class="zr-item" style="min-width:90px">
           <div class="zr-label">파라펫 내측</div>
           <div class="zr-val" style="font-size:11px;color:var(--muted)">+${result.parapetArea.toFixed(2)} ㎡</div>
         </div>
         ${result.parapetTopArea > 0 ? `<div class="zr-div"></div>
         <div class="zr-item" style="min-width:90px">
           <div class="zr-label">파라펫 상단</div>
           <div class="zr-val" style="font-size:11px;color:var(--muted)">+${result.parapetTopArea.toFixed(2)} ㎡</div>
         </div>` : ''}`
      : '';
    const ridgeHtml = (result.ridgeLen !== undefined)
      ? `<div class="zr-div"></div><div class="zr-item"><div class="zr-label">용마루</div><div class="zr-val" style="color:#1a7a3c">${result.ridgeLen > 0 ? result.ridgeLen.toFixed(2)+' m' : '없음(꼭짓점)'}</div></div>`
      : '';
    // 추녀마루 각각 표시 (4개)
    // 처마 분리(sameE=false) + 경사 분리(sameP=false) 조합 처리
    let hipHtml = '';
    if (result.hipLen !== undefined) {
      // 처마가 분리된 경우: W≠w+eS*2이므로 hipLen_L/hipLen_S 재계산 필요 없음
      // (calc에서 이미 W,D를 eL,eS 기반으로 계산했으므로 hipLen_L/hipLen_S 정확)
      const sameE = result.sameE !== false; // undefined이면 동일로 처리
      const eNote = (!sameE)
        ? `<div style="font-size:9px;color:var(--muted);margin-bottom:3px">긴면처마 ${result.eaveL}m · 짧은면처마 ${result.eaveS}m</div>`
        : '';

      let hipRows = '';
      if (result.sameP) {
        // 경사 동일 → 4개 모두 같은 길이
        const h = result.hipLen;
        hipRows = `
          <div style="font-size:11px"><span style="color:var(--muted)">①</span> <span style="color:#c46fff;font-weight:700">${h.toFixed(3)} m</span></div>
          <div style="font-size:11px"><span style="color:var(--muted)">②</span> <span style="color:#c46fff;font-weight:700">${h.toFixed(3)} m</span></div>
          <div style="font-size:11px"><span style="color:var(--muted)">③</span> <span style="color:#c46fff;font-weight:700">${h.toFixed(3)} m</span></div>
          <div style="font-size:11px"><span style="color:var(--muted)">④</span> <span style="color:#c46fff;font-weight:700">${h.toFixed(3)} m</span></div>`;
      } else {
        // 경사 다름 → 긴면H 기준 ①②, 짧은면H 기준 ③④
        const hL = result.hipLen_L;
        const hS = result.hipLen_S;
        hipRows = `
          <div style="font-size:9px;color:var(--muted);grid-column:1/-1;margin-bottom:2px">긴면 ${result.pitchLong}치 기준 (H=${result.H_L}m)</div>
          <div style="font-size:11px"><span style="color:var(--muted)">①</span> <span style="color:#c46fff;font-weight:700">${hL.toFixed(3)} m</span></div>
          <div style="font-size:11px"><span style="color:var(--muted)">②</span> <span style="color:#c46fff;font-weight:700">${hL.toFixed(3)} m</span></div>
          <div style="font-size:9px;color:var(--muted);grid-column:1/-1;margin-top:5px;margin-bottom:2px">짧은면 ${result.pitchShort}치 기준 (H=${result.H_S}m)</div>
          <div style="font-size:11px"><span style="color:var(--muted)">③</span> <span style="color:#c46fff;font-weight:700">${hS.toFixed(3)} m</span></div>
          <div style="font-size:11px"><span style="color:var(--muted)">④</span> <span style="color:#c46fff;font-weight:700">${hS.toFixed(3)} m</span></div>`;
      }
      hipHtml = `<div class="zr-div"></div>
        <div class="zr-item" style="min-width:160px">
          <div class="zr-label">추녀마루 (처마끝→용마루끝)</div>
          <div style="margin-top:4px">${eNote}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 10px">
              ${hipRows}
            </div>
          </div>
        </div>`;
    }

    // ── 강판 장수 계산 ──
    const ewKey = `z${zone.id}-effWidth`;
    let sheetsHtml = '';
    // 유효폭 / 강판길이 select 값 유지 또는 기본값
    const elKey = `z${zone.id}-effWidth`;
    const slKey = `z${zone.id}-sheetLen`;
    const existingEw = document.getElementById(elKey);
    const existingSl = document.getElementById(slKey);
    const ewVal = existingEw ? parseFloat(existingEw.value)||700 : 700;
    const slVal = existingSl ? parseFloat(existingSl.value)||3600 : 3600;

    // 공통 select HTML 생성
    const ewSelect = (id) => makeEwSelect(id, zone.id, ewVal);
    const slSelect = (id) => makeSlSelect(id, zone.id, slVal);

    const ew = ewVal / 1000;
    const sl = slVal / 1000;

    if (result.longSlopeLen !== undefined) {
      // 모임지붕: 긴면/짧은면 따로
      const longRows  = Math.ceil(result.W / ew);
      const shortRows = Math.ceil(result.D / ew);
      const longCols  = Math.ceil(result.longSlopeLen / sl);
      const shortCols = Math.ceil(result.shortSlopeLen / sl);
      const longSheets  = longRows  * longCols  * 2;
      const shortSheets = shortRows * shortCols * 2;
      const totalSheets = longSheets + shortSheets;
      const longLenLabel  = result.sameP === false
        ? `긴면(앞·뒤) ${result.longSlopeLen}m × ${longRows}줄 × ${longCols}단`
        : `긴면(앞·뒤) ${result.longSlopeLen}m × ${longRows}줄 × ${longCols}단`;
      const shortLenLabel = result.sameP === false
        ? `짧은면(좌·우) ${result.shortSlopeLen}m × ${shortRows}줄 × ${shortCols}단`
        : `짧은면(좌·우) ${result.shortSlopeLen}m × ${shortRows}줄 × ${shortCols}단`;
      sheetsHtml = `<div class="zr-div"></div>
        <div class="zr-item" style="min-width:220px">
          <div class="zr-label" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
            강판 장수
            ${ewSelect(elKey)}
            ${slSelect(slKey)}
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;margin-top:6px">
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
              <div style="font-size:10px;color:var(--muted)">${longLenLabel}</div>
              <div style="font-size:13px;color:#1a5fb4;font-weight:700;flex-shrink:0">${longSheets}장</div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
              <div style="font-size:10px;color:var(--muted)">${shortLenLabel}</div>
              <div style="font-size:13px;color:#1a5fb4;font-weight:700;flex-shrink:0">${shortSheets}장</div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid rgba(255,255,255,0.1);padding-top:4px;margin-top:1px">
              <div style="font-size:10px;color:var(--muted)">합계</div>
              <div style="font-size:15px;color:#cc0000;font-weight:700">${totalSheets}장</div>
            </div>
          </div>
        </div>`;
    } else if (result.slopeLen !== undefined && zone.shape !== 'flat') {
      // 박공·팔작·외쪽
      const rows = Math.ceil(result.slopeWidth / ew);
      const cols = Math.ceil(result.slopeLen / sl);
      const sheets = rows * cols * result.faceCount;
      const faceLabel = result.faceCount === 2 ? '×2면' : result.faceCount === 4 ? '×4면' : '×1면';
      sheetsHtml = `<div class="zr-div"></div>
        <div class="zr-item" style="min-width:220px">
          <div class="zr-label" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
            강판 장수
            ${ewSelect(elKey)}
            ${slSelect(slKey)}
          </div>
          <div style="margin-top:6px">
            <div style="font-size:10px;color:var(--muted)">빗면 ${result.slopeLen}m × ${rows}줄 × ${cols}단 ${faceLabel}</div>
            <div style="font-size:15px;color:#cc0000;font-weight:700;margin-top:3px">${sheets}장</div>
          </div>
        </div>`;
    } else if (zone.shape === 'flat') {
      // 평지붕: 가로/세로 방향별
      const sheetsX = Math.ceil(result.W / ew) * Math.ceil(result.D / sl);
      const sheetsY = Math.ceil(result.D / ew) * Math.ceil(result.W / sl);
      sheetsHtml = `<div class="zr-div"></div>
        <div class="zr-item" style="min-width:220px">
          <div class="zr-label" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
            강판 장수 (평지붕)
            ${ewSelect(elKey)}
            ${slSelect(slKey)}
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;margin-top:6px">
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
              <div style="font-size:10px;color:var(--muted)">가로방향 ${Math.ceil(result.W/ew)}줄×${Math.ceil(result.D/sl)}단</div>
              <div style="font-size:13px;color:#1a5fb4;font-weight:700;flex-shrink:0">${sheetsX}장</div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
              <div style="font-size:10px;color:var(--muted)">세로방향 ${Math.ceil(result.D/ew)}줄×${Math.ceil(result.W/sl)}단</div>
              <div style="font-size:13px;color:#1a5fb4;font-weight:700;flex-shrink:0">${sheetsY}장</div>
            </div>
          </div>
        </div>`;
    }

    // ── 처마마루 높이 / 용마루 높이 ──
    let heightHtml = '';
    if (result.eavH !== undefined) {
      const hasWall = result.wallH !== null && result.wallH !== undefined;
      const shape = zone.shape;
      // 마루높이 라벨: 지붕 형태별
      const eavLabel = shape==='shed' ? '용마루 높이차' : '마루높이 (처마→용마루)';
      // 외벽 입력 없으면 마루높이만, 있으면 처마높이+용마루높이 모두
      if (!hasWall) {
        // 외벽 미입력: 마루높이(수직)만 표시
        heightHtml = `<div class="zr-div"></div>
          <div class="zr-item" style="min-width:130px">
            <div class="zr-label">${eavLabel}</div>
            <div class="zr-val" style="color:#1a7a3c">${result.eavH.toFixed(3)} m</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">외벽 높이 입력 시 용마루 절대높이 계산</div>
          </div>`;
      } else {
        // 외벽 입력: 처마도리 높이 + 용마루 절대높이
        const isShed = shape === 'shed';
        heightHtml = `<div class="zr-div"></div>
          <div class="zr-item" style="min-width:150px">
            <div class="zr-label">높이 정보</div>
            <div style="display:flex;flex-direction:column;gap:3px;margin-top:4px">
              <div style="font-size:11px">
                <span style="color:var(--muted)">${isShed?'낮은쪽 처마':'처마도리'}</span>
                <span style="color:#1a7a3c;font-weight:700;margin-left:6px">${result.wallH.toFixed(3)} m</span>
              </div>
              <div style="font-size:11px">
                <span style="color:var(--muted)">${eavLabel}</span>
                <span style="color:#1a7a3c;font-weight:700;margin-left:6px">+ ${result.eavH.toFixed(3)} m</span>
              </div>
              <div style="font-size:11px;border-top:1px solid rgba(255,255,255,0.12);padding-top:3px;margin-top:1px">
                <span style="color:var(--muted)">용마루 높이</span>
                <span style="color:#cc0000;font-weight:700;font-size:13px;margin-left:6px">${result.ridgeH.toFixed(3)} m</span>
              </div>
              ${isShed ? `<div style="font-size:11px"><span style="color:var(--muted)">높은쪽 처마</span><span style="color:#1a7a3c;font-weight:700;margin-left:6px">${result.ridgeH.toFixed(3)} m</span></div>` : ''}
            </div>
          </div>`;
      }
    }
    el.innerHTML = `
      <div class="zr-item"><div class="zr-label">수평투영</div><div class="zr-val">${(result.flat||0).toFixed(2)} ㎡</div></div>
      ${showFactor?`<div class="zr-div"></div><div class="zr-item"><div class="zr-label">경사계수</div><div class="zr-val">${(result.factor||1).toFixed(4)}</div></div>`:''}
      <div class="zr-div"></div>
      <div class="zr-item"><div class="zr-label">실면적</div><div class="zr-val accent">${(result.real||0).toFixed(2)} ㎡</div></div>
      <div class="zr-div"></div>
      <div class="zr-item"><div class="zr-label">할증(${pct}) 적용</div><div class="zr-val accent2">${(surcharge||0).toFixed(2)} ㎡</div></div>
      ${rakeHtml}
      ${eaveInfoHtml}
      ${parapetHtml}
      ${ridgeHtml}
      ${hipHtml}
      ${heightHtml}
      ${sheetsHtml}`;
  }
  recalcTotal();
}

function removeZone(id) {
  _zones = _zones.filter(z=>z.id!==id);
  const card = document.getElementById(`zone-card-${id}`);
  if (card) card.remove();
  // 번호 재정렬
  _zones.forEach((z,i) => {
    const numEl = document.querySelector(`#zone-card-${z.id} .zone-num`);
    if(numEl) numEl.textContent = i+1;
  });
  recalcTotal();
}

function recalcTotal() {
  const bar = document.getElementById('zones-total-bar');
  const validZones = _zones.filter(z=>z.result);
  if (validZones.length === 0) { bar.style.display='none'; return; }

  let totalFlat=0, totalReal=0, totalSurcharge=0;
  validZones.forEach(z => {
    totalFlat      += z.result.flat  || 0;
    totalReal      += z.result.real  || 0;
    totalSurcharge += (z.result.real || 0) * (z.result.surchargeRate || 1.1);
  });

  bar.style.display='block';
  const breakdownHtml = validZones.map(z => {
    const name = document.getElementById(`zname-${z.id}`)?.value || SHAPE_DEFS[z.shape].name;
    const surcharge = z.result.real * z.result.surchargeRate;
    return `<div class="zt-item"><div class="zt-name">${name}</div><div class="zt-val" style="color:var(--muted);font-size:12px">${surcharge.toFixed(1)} ㎡</div></div><div class="zt-div"></div>`;
  }).join('');

  document.getElementById('zt-items').innerHTML = `
    ${breakdownHtml}
    <div class="zt-item" style="padding-left:14px"><div class="zt-name">합산 실면적</div><div class="zt-val" style="color:var(--accent)">${totalReal.toFixed(2)} ㎡</div></div>
    <div class="zt-div"></div>
    <div class="zt-item"><div class="zt-name">할증 포함 합계</div><div class="zt-val" style="color:var(--accent2);font-size:17px">${totalSurcharge.toFixed(2)} ㎡</div></div>`;
}

// ── 자재 수량 자동 산출 ──
// 구역 치수로부터 각 자재의 실수량을 계산해 qty에 반영
function autoCalcQty(zones) {
  if (!zones || zones.length === 0) return;

  let totalSlopeReal  = 0;   // 경사 실면적 합계
  let totalFlatFloor  = 0;   // 평지붕 바닥 면적 합계
  let totalFlatReal   = 0;   // 평지붕 총 방수면적 (바닥+파라펫)
  let totalSurcharge  = 0;   // 할증포함 총 발주면적 (경사지붕 전용)
  let totalFlatSurcharge = 0; // 할증포함 총 발주면적 (평지붕 전용)
  let ridgeLen        = 0;   // 용마루 총 길이 (m)
  let hipLenTotal     = 0;   // 추녀마루 총 길이 (m, ×4)
  let gutterLen       = 0;   // 처마 물받이 총 길이 (m)
  let downspoutCount  = 0;   // 낙수관 수
  let drainCount      = 0;   // 평지붕 드레인 수
  let zoneCount       = 0;   // 구역 수

  zones.forEach(z => {
    if (!z.result) return;
    const r = z.result;
    const shape = z.shape;
    const W = r.W || 0;
    const D = r.D || 0;
    zoneCount++;

    if (shape === 'flat') {
      totalFlatFloor += (r.floorArea || r.flat || 0);
      totalFlatReal  += (r.real || 0);
      totalFlatSurcharge += (r.real || 0) * (r.surchargeRate || 1.05);
      // 드레인: 50㎡당 1개
      drainCount += Math.ceil((r.floorArea || r.flat || 0) / 50);

    } else {
      totalSlopeReal += (r.real || 0);
      totalSurcharge += (r.real || 0) * (r.surchargeRate || 1.1);

      // 용마루
      if (r.ridgeLen !== undefined && r.ridgeLen > 0) ridgeLen += r.ridgeLen;

      // 추녀마루 (모임·팔작)
      if (r.hipLen !== undefined) hipLenTotal += r.hipLen * 4;

      // 처마 물받이 - W, D 실제값으로 계산
      if (W > 0 && D > 0) {
        if (shape === 'gable') {
          gutterLen += W * 2;           // 앞뒤 낙수처마 2면
        } else if (shape === 'hip') {
          gutterLen += (W + D) * 2;     // 4면 처마 전체 둘레
        } else if (shape === 'halfhip') {
          gutterLen += (W + D) * 2;     // 4면 처마 전체 둘레
        } else if (shape === 'shed') {
          gutterLen += W;               // 낮은쪽 1면만
        }
      }
    }
  });

  // 낙수관: 물받이 8m당 1개 기준 (좌우 대칭으로 × 2)
  downspoutCount = Math.max(2, Math.ceil(gutterLen / 8));

  // ── setQty 헬퍼 ──
  const setQty = (key, qty, forceCheck) => {
    if (state[key] === undefined) return;
    const _qty = parseFloat(qty);
    if (!_qty || isNaN(_qty) || !isFinite(_qty) || _qty <= 0) return;
    state[key].qty = parseFloat(_qty.toFixed(2));
    if (forceCheck) state[key].checked = true;
  };

  // ─ 판재: 칼라강판 지붕판 (㎡) — 할증포함 경사면적
  setQty('panel-roof-0', totalSurcharge, true);

  // ─ 용마루 캡 (m) + 5% 여유
  if (ridgeLen > 0) setQty('panel-roof-1', ridgeLen * 1.05, true);

  // ─ 힙 마감재 / 추녀마루 (m) + 5% 여유
  if (hipLenTotal > 0) setQty('panel-roof-2', hipLenTotal * 1.05, true);

  // ─ 아스팔트루핑 940 (롤): 1롤=20㎡, 10% 여유
  if (totalSlopeReal > 0) setQty('panel-wp-0', Math.ceil(totalSlopeReal * 1.1 / 20));

  // ─ 구조용합판 12T (장): 1장=900×1800=1.62㎡, 10% 여유
  if (totalSlopeReal > 0) setQty('panel-ply-1', Math.ceil(totalSlopeReal * 1.1 / 1.62));

  // ─ 평지붕: PVC 방수시트 (롤) 1롤=20㎡, 할증포함
  if (totalFlatSurcharge > 0) setQty('panel-flat-0', Math.ceil(totalFlatSurcharge / 20), true);

  // ─ 평지붕: 우레탄방수재 (통) 3kg/㎡, 18kg/통
  if (totalFlatReal > 0) setQty('panel-flat-1', Math.ceil(totalFlatReal * 3 / 18), true);

  // ─ 평지붕: 에폭시 프라이머 (통) 0.25L/㎡, 18L/통
  if (totalFlatReal > 0) setQty('panel-flat-2', Math.ceil(totalFlatReal * 0.25 / 18), true);

  // ─ 평지붕 하지 장선 자동산출 (간격 기준)
  if (totalFlatReal > 0) {
    const spacing = parseFloat(document.getElementById('haji-spacing')?.value || 455) / 1000;
    const L_UNIT  = 3.6;

    // 각 평지붕 구역의 W, D 합산
    let flatW = 0, flatD = 0, flatZoneCount = 0;
    _zones.forEach(z => {
      if (!z.result || z.shape !== 'flat') return;
      flatW += z.result.W || 0;
      flatD += z.result.D || 0;
      flatZoneCount++;
    });

    if (flatZoneCount > 0) {
      const avgW = flatW / flatZoneCount;
      const avgD = flatD / flatZoneCount;

      // 장선(X방향): ceil(avgW / spacing) 열 × ceil(avgD / L_UNIT) 본
      const joistsX = Math.ceil(avgW / spacing) * Math.ceil(avgD / L_UNIT) * flatZoneCount;
      // 장선(Y방향): ceil(avgD / spacing) 열 × ceil(avgW / L_UNIT) 본
      const joistsY = Math.ceil(avgD / spacing) * Math.ceil(avgW / L_UNIT) * flatZoneCount;
      const totalJoists = Math.ceil((joistsX + joistsY) / 2); // 평균 (격자 방향 선택)
      setQty('bone-wood-6', totalJoists, true); // 평지붕 장선 45×45
    }
  }

  // ─ 평지붕 드레인 (개)
  if (drainCount > 0) setQty('panel-flat-4', drainCount, true);

  // ─ 처마 물받이 (m) + 5% 여유
  if (gutterLen > 0) {
    setQty('gutter-0', gutterLen * 1.05, true);
    // 브라켓: 600mm 간격 → 1m당 1.7개
    setQty('gutter-1', Math.ceil(gutterLen * 1.7), true);
    // 조인트: 3m당 1개
    setQty('gutter-2', Math.ceil(gutterLen / 3), true);
    // 엔드캡: 구역별 코너 2개
    setQty('gutter-3', zoneCount * 2, true);
  }

  // ─ 낙수관 (개)
  if (downspoutCount > 0) {
    setQty('gutter-4', downspoutCount, true);
    // 엘보: 낙수관당 2개
    setQty('gutter-5', downspoutCount * 2, true);
    // 클립: 낙수관당 3개 (1.5m 간격, 평균 높이 4.5m 기준)
    setQty('gutter-6', downspoutCount * 3, true);
  }

  // ─ 하지 목재 자동산출 (간격 기준)
  if (totalSlopeReal > 0) {
    const spacing = parseFloat(document.getElementById('haji-spacing')?.value || 455) / 1000; // mm→m
    const L_UNIT  = 3.6; // 1본 길이

    // 유효 경사면적 기준 폭/길이 추정
    // 각 구역의 W, slopeLen 합산
    let totalW = 0, totalSlopeLen = 0, zoneCount = 0;
    _zones.forEach(z => {
      if (!z.result || z.shape === 'flat') return;
      const r = z.result;
      // 모임지붕: 긴면 W, 짧은면 D 평균
      if (z.shape === 'hip') {
        totalW        += ((r.W||0) + (r.D||0)) / 2;
        totalSlopeLen += ((r.longSlopeLen||0) + (r.shortSlopeLen||0)) / 2;
      } else {
        totalW        += r.W || r.slopeWidth || 0;
        totalSlopeLen += r.slopeLen || 0;
      }
      zoneCount++;
    });

    if (zoneCount > 0) {
      const avgW        = totalW / zoneCount;
      const avgSlopeLen = totalSlopeLen / zoneCount;

      // ① 방부목 각재 45×45 (기본 선택) — 서까래 방향 가로대
      //    열 수 = ceil(avgW / spacing), 본수 = ceil(avgSlopeLen / L_UNIT) × 열수 × zoneCount
      const rowCount  = Math.ceil(avgW / spacing);           // 간격당 열수
      const lenPerRow = Math.ceil(avgSlopeLen / L_UNIT);     // 경사길이 커버 본수
      const woodQty   = rowCount * lenPerRow * zoneCount;
      setQty('bone-wood-2', woodQty, true); // 45×45 (index 2, default:true)

      // ② 서까래 보강 각재 — 용마루/추녀마루 보강: ridgeLen + hipLen 기준
      let totalRidge = 0, totalHip = 0;
      _zones.forEach(z => {
        if (!z.result || z.shape === 'flat') return;
        totalRidge += z.result.ridgeLen || 0;
        totalHip   += (z.result.hipLen  || 0) * (z.result.hipCount || 0);
      });
      const frameQty = Math.ceil((totalRidge + totalHip) / L_UNIT);
      setQty('bone-frame-0', frameQty, true); // 서까래 보강 각재

      // ③ 중도리 각재 — 경사 방향 중간 수평재: 경사길이 3등분 기준
      const purlinRows  = Math.max(1, Math.round(avgSlopeLen / 1.2)); // 1.2m 간격
      const purlinQty   = Math.ceil(avgW / L_UNIT) * purlinRows * zoneCount;
      setQty('bone-frame-1', purlinQty, true); // 중도리 각재

      // ④ 마루대 각재 — 용마루 길이 기준
      setQty('bone-frame-3', Math.ceil(totalRidge / L_UNIT), true);

      // ⑤ 처마 각재 — 처마 둘레 기준
      let eavPerim = 0;
      _zones.forEach(z => {
        if (!z.result || z.shape === 'flat') return;
        const r = z.result;
        if (z.shape === 'hip')       eavPerim += ((r.W||0) + (r.D||0)) * 2;
        else if (z.shape === 'gable') eavPerim += (r.W||0) * 2;
        else if (z.shape === 'shed')  eavPerim += (r.W||0);
        else                          eavPerim += (r.W||0) * 2;
      });
      setQty('bone-frame-2', Math.ceil(eavPerim / L_UNIT), true); // 처마 각재
    }
  }

  // ─ 목재 피스 (박스): 30㎡당 1박스
  if (totalSlopeReal > 0) setQty('sub-hw-0', Math.ceil(totalSlopeReal / 30), true);

  // ─ 와셔피스 (박스): 1㎡당 6개, 250개/박스
  if (totalSurcharge > 0) setQty('sub-hw-1', Math.ceil(totalSurcharge * 6 / 250), true);

  // ─ 루핑못 (봉): 루핑 1롤당 0.5봉 기준
  if (totalSlopeReal > 0) setQty('sub-hw-3', Math.ceil(totalSlopeReal * 1.1 / 20 * 0.5), true);

  // DOM 수량 및 금액 업데이트
  Object.keys(state).forEach(key => {
    const row = document.getElementById(`row-${key}`);
    if (!row) return;
    const qtyEl = row.querySelector('.item-qty');
    if (qtyEl) { const _q = parseFloat(state[key].qty); qtyEl.value = (isNaN(_q)||!isFinite(_q)) ? 0 : _q; }
    refreshRow(key);
  });

  // ─ 공법별 하지 체크 처리
  const workTypeVal = document.getElementById('work-type')?.value || 'overlay';
  if (workTypeVal === 'overlay') {
    // 덧씌우기: 하지 자재 전체 체크 해제 (수량은 유지)
    const boneSections = ['bone-wood', 'bone-frame', 'bone-steel'];
    boneSections.forEach(secId => {
      const sec = SECTIONS.find(s => s.id === secId);
      if (!sec) return;
      sec.items.forEach((item, idx) => {
        const key = `${secId}-${idx}`;
        if (state[key]) {
          state[key].checked = false;
          // DOM 체크박스도 해제
          const row = document.getElementById(`row-${key}`);
          if (row) {
            const cb = row.querySelector('.check-box');
            if (cb) cb.checked = false;
          }
          refreshRow(key);
        }
      });
    });
  }
  // 철거 후 재시공: 자동산출된 수량 그대로 체크 유지 (별도 처리 불필요)

  // 자동산출 배너 표시
  let banner = document.getElementById('auto-qty-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'auto-qty-banner';
    banner.style.cssText = 'background:rgba(61,186,122,0.12);border:1px solid rgba(61,186,122,0.4);border-radius:8px;padding:8px 14px;font-size:12px;color:#1a7a3c;margin:8px 0;display:flex;align-items:center;gap:8px;';
    const isOverlay = (document.getElementById('work-type')?.value || 'overlay') === 'overlay';
    banner.innerHTML = `<span>✅</span><span>치수 기반 자재 수량 자동 산출 완료.${isOverlay ? ' <b style="color:#cc0000;">덧씌우기 공법</b> — 하지 자재 체크 해제됨 (수량 참고용 유지).' : ' <b style="color:#1a5fb4;">철거 후 재시공</b> — 하지 자재 포함 전체 산출.'} 수량은 직접 수정 가능합니다.</span>`;
    const matSection = document.querySelector('.sections-wrap');
    if (matSection) matSection.insertBefore(banner, matSection.firstChild);
  }
}

function applyRoofArea() {
  const validZones = _zones.filter(z=>z.result);
  if (validZones.length===0) return;
  const totalSurcharge = validZones.reduce((s,z)=>s+z.result.real*z.result.surchargeRate, 0);
  document.getElementById('roof-area').value = totalSurcharge.toFixed(2);
  document.getElementById('applied-val').textContent = totalSurcharge.toFixed(2);
  document.getElementById('zones-total-bar').style.display='none';
  document.getElementById('roof-area-applied').style.display='flex';
  // 적용 후 자재 섹션에 구역 정보 배지 표시
  updateZoneSectionBadges(validZones);
  autoCalcQty(validZones);
  calcAll();
}

function getAppliedZoneTypes() {
  // 현재 적용된 구역들의 지붕 타입 목록 반환
  const validZones = _zones.filter(z=>z.result);
  const types = new Set(validZones.map(z => z.shape === 'flat' ? 'flat' : 'slope'));
  return types;
}

function updateZoneSectionBadges(zones) {
  const hasFlat  = zones.some(z => z.shape === 'flat');
  const hasSlope = zones.some(z => z.shape !== 'flat');

  SECTIONS.forEach(sec => {
    const header = document.querySelector(`#body-${sec.id}`)?.closest('.section')?.querySelector('.section-header');
    if (!header) return;
    // 기존 배지 제거
    header.querySelectorAll('.zone-type-badge').forEach(b=>b.remove());
    const rt = sec.roofType;
    if (!rt || rt === 'common') return;

    let badgeText = '', badgeColor = '';
    if (rt === 'slope' && hasSlope && hasFlat) {
      badgeText = '경사지붕 구역'; badgeColor = '#4a9eff';
    } else if (rt === 'flat' && hasFlat && hasSlope) {
      badgeText = '평지붕 구역'; badgeColor = '#3dba7a';
    } else if (rt === 'slope' && !hasFlat) {
      return; // 경사만 있으면 배지 불필요
    } else if (rt === 'flat' && !hasSlope) {
      return;
    } else if (rt === 'slope' && hasFlat) {
      badgeText = '경사지붕 구역'; badgeColor = '#4a9eff';
    } else if (rt === 'flat' && hasFlat) {
      badgeText = '평지붕 구역'; badgeColor = '#3dba7a';
    }
    if (!badgeText) return;
    const badge = document.createElement('span');
    badge.className = 'zone-type-badge';
    badge.style.cssText = `font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:${badgeColor}22;border:1px solid ${badgeColor}66;color:${badgeColor};margin-left:8px;`;
    badge.textContent = badgeText;
    header.querySelector('.section-title').after(badge);
  });
}

// 자재 리스트 팝업에서 구역별로 그룹핑해서 표시
function showMaterialListByZone() {
  const validZones = _zones.filter(z=>z.result);
  const hasFlat  = validZones.some(z => z.shape === 'flat');
  const hasSlope = validZones.some(z => z.shape !== 'flat');
  const isMixed = hasFlat && hasSlope;
  return { isMixed, hasFlat, hasSlope };
}

function pitchFactor(p) {
  return Math.sqrt(1 + Math.pow(p / 10, 2));
}

function selectShape(shape, el) {
  _currentShape = shape;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderCalcInputs(shape);
  document.getElementById('roof-calc-result').style.display = 'none';
  document.getElementById('roof-area-applied').style.display = 'none';
  document.getElementById('roof-area').value = '';
}

function renderCalcInputs(shape) {
  const def = SHAPES[shape];
  const desc = document.getElementById('shape-desc');
  desc.innerHTML = `<b>${def.name}</b> &nbsp;|&nbsp; ${def.desc}`;

  const container = document.getElementById('roof-calc-inputs');
  const cols = def.fields.length <= 4 ? def.fields.length : 5;
  container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  container.innerHTML = def.fields.map(f => {
    if (f.type === 'select') {
      return `<div class="field-group"><div class="field-label">${f.label}</div>${PITCH_SELECT}</div>`;
    }
    return `<div class="field-group"><div class="field-label">${f.label}</div><input class="field-input" id="${f.id}" type="number" min="0" step="0.1" placeholder="${f.ph}" oninput="calcRoofArea()"></div>`;
  }).join('');
}

function calcRoofArea() {
  const shape = SHAPES[_currentShape];
  const v = {
    w: parseFloat(document.getElementById('roof-w')?.value) || 0,
    d: parseFloat(document.getElementById('roof-d')?.value) || 0,
    pitch: parseFloat(document.getElementById('roof-pitch')?.value) || 0,
    eave: parseFloat(document.getElementById('roof-eave')?.value) || 0,
  };

  const result = shape.calc(v);
  if (!result) {
    document.getElementById('roof-calc-result').style.display = 'none';
    return;
  }

  const surchargeRate = result.surchargeRate || 1.1;
  const surcharge = result.real * surchargeRate;
  const surchargeLabel = surchargeRate === 1.05 ? '5% 할증 포함' : '10% 할증 포함';

  const showFactor = _currentShape !== 'flat';
  document.getElementById('res-factor-row').style.display = showFactor ? '' : 'none';
  document.getElementById('res-factor-div').style.display = showFactor ? '' : 'none';

  document.getElementById('res-flat').textContent = result.flat.toFixed(2) + ' ㎡';
  document.getElementById('res-factor').textContent = (result.factor||1).toFixed(4);
  document.getElementById('res-area').textContent = (result.real||0).toFixed(2) + ' ㎡';
  document.getElementById('res-area-surcharge').textContent = (surcharge||0).toFixed(2) + ' ㎡';
  document.querySelector('#roof-calc-result .highlight2 .roof-result-label').innerHTML =
    `견적 적용면적 <small>(${surchargeLabel})</small>`;

  document.getElementById('roof-calc-result').style.display = 'flex';
  document.getElementById('roof-area-applied').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', () => addZone('gable'));

// State
let state = {};

function initState() {
  SECTIONS.forEach(sec => {
    sec.items.forEach((item, idx) => {
      const key = `${sec.id}-${idx}`;
      state[key] = {
        checked: item.default,
        qty: item.default ? 1 : 0,
        price: item.price,
        name: item.name,
        unit: item.unit,
        spec: item.spec,
        cat: sec.cat,
        secId: sec.id
      };
    });
  });
}

function render() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  SECTIONS.forEach(sec => {
    const div = document.createElement('div');
    div.className = 'section';
    div.dataset.cat = sec.cat;

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <div class="section-dot" style="background:${sec.color}"></div>
        <div class="section-title" style="color:${sec.color}">${sec.title}</div>
        <span class="section-toggle" id="toggle-${sec.id}">▼</span>
      </div>
      <div class="section-body" id="body-${sec.id}">
        ${sec.sub ? `<div class="subsection-label">${sec.sub}</div>` : ''}
        <div class="item-row header-row">
          <span>✓</span>
          <span>자재명 / 규격</span>
          <span style="text-align:right">단가(원)</span>
          <span style="text-align:center">단위</span>
          <span style="text-align:right">수량</span>
          <span style="text-align:right">금액(원)</span>
          <span></span>
        </div>
        ${sec.items.map((item, idx) => renderItem(sec.id, idx, item)).join('')}
        <div class="add-area no-print">
          <input class="add-name-input" id="add-input-${sec.id}" placeholder="+ 자재 직접 입력..." onkeydown="if(event.key==='Enter') addCustomItem('${sec.id}')">
          <button class="btn-add-item" onclick="addCustomItem('${sec.id}')">추가</button>
        </div>
      </div>
    `;
    container.appendChild(div);
  });

  calcAll();
}

function renderItem(secId, idx, item) {
  const key = `${secId}-${idx}`;
  const s = state[key] || { checked: false, qty: 0, price: item.price };
  const total = s.checked && s.qty > 0 ? s.qty * s.price : 0;
  return `
    <div class="item-row" id="row-${key}">
      <input type="checkbox" class="check-box" ${s.checked ? 'checked' : ''} onchange="toggleItem('${key}', this)">
      <div class="item-name">${item.name}<small>${item.spec || ''}</small></div>
      <input class="item-price" type="number" value="${s.price}" oninput="updatePrice('${key}', this.value)" style="${!s.checked ? 'opacity:0.4' : ''}">
      <div class="item-unit">${item.unit}</div>
      <input class="item-qty" type="number" value="${s.qty}" min="0" step="1" oninput="updateQty('${key}', this.value)" style="${!s.checked ? 'opacity:0.4' : ''}">
      <div class="item-total ${total === 0 ? 'zero' : ''}" id="total-${key}">${total === 0 ? '—' : total.toLocaleString()}</div>
      <button class="btn-del no-print" onclick="deleteItem('${key}')">✕</button>
    </div>
  `;
}

function toggleItem(key, el) {
  state[key].checked = el.checked;
  if (el.checked && state[key].qty === 0) {
    state[key].qty = 1;
    const qtyEl = document.querySelector(`#row-${key} .item-qty`);
    if (qtyEl) qtyEl.value = 1;
  }
  refreshRow(key);
  calcAll();
}

function updateQty(key, val) {
  state[key].qty = parseFloat(val) || 0;
  refreshTotal(key);
  calcAll();
}

function updatePrice(key, val) {
  state[key].price = parseFloat(val) || 0;
  refreshTotal(key);
  calcAll();
}

function refreshRow(key) {
  const s = state[key];
  const opacity = s.checked ? '1' : '0.4';
  const row = document.getElementById(`row-${key}`);
  if (!row) return;
  row.querySelectorAll('.item-qty, .item-price').forEach(el => el.style.opacity = opacity);
  refreshTotal(key);
}

function refreshTotal(key) {
  const s = state[key];
  const total = s.checked && s.qty > 0 ? s.qty * s.price : 0;
  const el = document.getElementById(`total-${key}`);
  if (el) {
    el.textContent = total === 0 ? '—' : total.toLocaleString();
    el.className = `item-total ${total === 0 ? 'zero' : ''}`;
  }
}

function calcAll() {
  let cat1 = 0, cat2 = 0, cat34 = 0, total = 0, count = 0;
  Object.values(state).forEach(s => {
    if (s.checked && s.qty > 0) {
      const amt = s.qty * s.price;
      total += amt;
      count++;
      if (s.cat === '1') cat1 += amt;
      else if (s.cat === '2') cat2 += amt;
      else cat34 += amt;
    }
  });
  document.getElementById('sum-count').innerHTML = `${count} <small>종</small>`;
  document.getElementById('sum-cat1').innerHTML = `${cat1.toLocaleString()} <small>원</small>`;
  document.getElementById('sum-cat2').innerHTML = `${cat2.toLocaleString()} <small>원</small>`;
  document.getElementById('sum-cat34').innerHTML = `${cat34.toLocaleString()} <small>원</small>`;
  document.getElementById('sum-total').innerHTML = `${total.toLocaleString()} <small>원</small>`;
  // Update print info bar
  const bar = document.getElementById('print-info-bar');
  if (bar) {
    const siteName = document.getElementById('site-name').value || '(현장명 미입력)';
    const siteAddr = document.getElementById('site-addr').value || '';
    const workSel = document.getElementById('work-type');
    const workType = workSel.options[workSel.selectedIndex].text;
    const area = document.getElementById('roof-area').value;
    const today = new Date().toLocaleDateString('ko-KR');
    bar.innerHTML = `<span style="font-size:15px;font-weight:700;color:#f0c060">${siteName}</span><span style="color:#111111">${siteAddr}</span><span style="color:#e8a020">${workType}</span>${area ? '<span style="color:#111111">지붕면적: ' + area + ' ㎡</span>' : ''}<span style="color:#111111;margin-left:auto">작성일: ${today}</span>`;
  }
}

function toggleSection(id) {
  const sec = document.querySelector(`#body-${id}`).closest('.section');
  sec.classList.toggle('collapsed');
}

let _currentCat = 'all';

function filterCat(cat, el) {
  _currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.section').forEach(sec => {
    sec.style.display = (cat === 'all' || sec.dataset.cat === cat) ? '' : 'none';
  });
}

function checkAll(checked) {
  SECTIONS.forEach(sec => {
    sec.items.forEach((item, idx) => {
      const key = `${sec.id}-${idx}`;
      if (!state[key]) return;
      state[key].checked = checked;
      const row = document.getElementById(`row-${key}`);
      if (row) {
        const cb = row.querySelector('.check-box');
        if (cb) cb.checked = checked;
      }
      refreshRow(key);
    });
  });
  calcAll();
}

function checkCat(checked) {
  SECTIONS.forEach(sec => {
    if (_currentCat !== 'all' && sec.cat !== _currentCat) return;
    sec.items.forEach((item, idx) => {
      const key = `${sec.id}-${idx}`;
      if (!state[key]) return;
      state[key].checked = checked;
      const row = document.getElementById(`row-${key}`);
      if (row) {
        const cb = row.querySelector('.check-box');
        if (cb) cb.checked = checked;
      }
      refreshRow(key);
    });
  });
  calcAll();
}

let customCount = 0;
function addCustomItem(secId) {
  const input = document.getElementById(`add-input-${secId}`);
  const name = input.value.trim();
  if (!name) return;

  const sec = SECTIONS.find(s => s.id === secId);
  const idx = `custom_${++customCount}`;
  const key = `${secId}-${idx}`;
  const newItem = { name, spec: '직접입력', unit: '개', price: 0, default: true };
  sec.items.push(newItem);
  state[key] = { checked: true, qty: 1, price: 0, name, unit: '개', spec: '직접입력', cat: sec.cat, secId };

  const body = document.getElementById(`body-${secId}`);
  const addArea = body.querySelector('.add-area');
  const div = document.createElement('div');
  div.innerHTML = renderItem(secId, idx, newItem);
  body.insertBefore(div.firstChild, addArea);

  input.value = '';
  calcAll();
}

function deleteItem(key) {
  const row = document.getElementById(`row-${key}`);
  if (row) row.remove();
  delete state[key];
  calcAll();
}

function resetAll() {

  // 구역 초기화
  _zones = [];

  if (zc) zc.innerHTML = '';
  // 자재 초기화
  Object.keys(state).forEach(key => {
    const secId = state[key].secId;
    const sec = SECTIONS.find(s => s.id === secId);
    if (sec) {
      const idx = parseInt(key.split('-')[1]);
      const item = sec.items[idx];
      if (item) {
        state[key].checked = item.default;
        state[key].qty = item.default ? 1 : 0;
        state[key].price = item.price;
      }
    }
  });
  render();
}

// ===== 자재 리스트 모달 =====
let _listMode = 'checked'; // 'checked' | 'all'

function setListMode(mode) {
  _listMode = mode;
  document.getElementById('btn-checked').style.background = mode === 'checked' ? '#111111' : '#ffffff';
  document.getElementById('btn-checked').style.color = mode === 'checked' ? '#ffffff' : '#111111';
  document.getElementById('btn-all').style.background = mode === 'all' ? '#111111' : '#ffffff';
  document.getElementById('btn-all').style.color = mode === 'all' ? '#ffffff' : '#111111';
  renderMatList();
}

function collectRows(mode) {
  mode = mode || _listMode;
  const catNames = { '1': '② 뼈대(하지)', '2': '① 판재', '3': '③ 물받이', '4': '④ 부자재' };
  const rows = [];
  SECTIONS.forEach(sec => {
    sec.items.forEach((item, idx) => {
      const key = `${sec.id}-${idx}`;
      const s = state[key];
      if (!s) return;
      // checked 모드: 체크된 항목만 (qty 0이어도 체크면 포함)
      if (mode === 'checked' && !s.checked) return;
      const checked = s.checked;
      const qty = s.qty || 0;
      rows.push({ cat: sec.cat, catName: catNames[sec.cat], secTitle: sec.title, secId: sec.id, name: s.name || item.name, spec: s.spec !== undefined ? s.spec : (item.spec || ''), unit: item.unit, price: s.price, qty, total: checked && qty > 0 ? qty * s.price : 0, checked });
    });
  });
  Object.keys(state).forEach(key => {
    if (key.includes('custom_')) {
      const s = state[key];
      if (mode === 'checked' && !s.checked) return;
      const checked = s.checked;
      const qty = s.qty || 0;
      rows.push({ cat: s.cat, catName: catNames[s.cat], secTitle: catNames[s.cat], name: s.name, spec: '직접입력', unit: s.unit, price: s.price, qty, total: checked && qty > 0 ? qty * s.price : 0, checked });
    }
  });
  return rows;
}
