<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>외쪽지붕 강판 배치 평면도</title>
<style>
  * { box-sizing: border-box; }
  body { font-family:'Malgun Gothic',sans-serif; background:#f0f2f5; padding:16px; color:#333; margin:0; }
  h2  { margin:0 0 4px; font-size:18px; }
  .sub{ color:#666; font-size:12px; margin-bottom:14px; }

  .form-card { background:white; border-radius:10px; padding:14px 18px; box-shadow:0 2px 8px rgba(0,0,0,.1);
               margin-bottom:14px; display:flex; flex-wrap:wrap; gap:10px 20px; align-items:flex-end; }
  .form-group { display:flex; flex-direction:column; gap:3px; }
  .form-group label { font-size:11px; color:#666; font-weight:bold; }
  .form-group input, .form-group select {
    border:1px solid #ccc; border-radius:6px; padding:5px 8px;
    font-size:13px; font-family:inherit; width:90px; background:#fff; }
  .form-group select { width:180px; }
  .btn-calc { background:#1a5fb4; color:white; border:none; padding:8px 18px;
              border-radius:7px; font-size:13px; cursor:pointer; font-family:inherit; font-weight:bold; }
  .btn-calc:hover { background:#1347a0; }

  .outer { display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap; }
  .col-left  { display:flex; flex-direction:column; gap:14px; }
  .col-right { display:flex; flex-direction:column; gap:14px; min-width:0; flex:0 0 300px; max-width:340px; }
  .card { background:white; border-radius:10px; padding:14px 16px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
  .sec-title { font-size:12px; font-weight:bold; color:#1a3a6a; margin:0 0 10px;
               padding-bottom:5px; border-bottom:2px solid #e8eef8; }

  .tbl-wrap { overflow-x:auto; width:100%; }
  table { border-collapse:collapse; width:100%; font-size:11px; margin-top:6px; }
  th { background:#f0f4f8; padding:4px 5px; border:1px solid #ddd; text-align:center; font-size:10px; }
  td { padding:3px 5px; border:1px solid #eee; text-align:center; font-size:11px; }
  .tr-sub td { font-weight:bold; background:#fffbe6; }
  .tr-grand td { font-weight:bold; background:#e8f4ff; }
  .note { font-size:11px; color:#888; margin-top:8px; line-height:1.7; }
  .empty { color:#aaa; font-size:13px; text-align:center; padding:40px 0; }
</style>
</head>
<body>
<h2>📐 외쪽지붕 기와강판 배치 평면도</h2>
<p class="sub" id="specLine">수치를 입력하고 [계산] 버튼을 누르세요.</p>

<div class="form-card">
  <div class="form-group">
    <label>처마포함 가로 W (m)</label>
    <input id="inp-W" type="number" step="0.01" placeholder="예) 10.0">
  </div>
  <div class="form-group">
    <label>처마포함 세로 D (m)</label>
    <input id="inp-D" type="number" step="0.01" placeholder="예) 7.0">
  </div>
  <div class="form-group">
    <label>경사도 (치)</label>
    <input id="inp-p" type="number" step="0.5" placeholder="예) 3.5">
  </div>
  <div class="form-group">
    <label>강판 종류</label>
    <select id="inp-ew">
      <option value="700">기와강판 (유효폭 700mm)</option>
      <option value="720">기와강판 (유효폭 720mm)</option>
      <option value="600">징크강판 (유효폭 600mm)</option>
      <option value="500">징크강판 (유효폭 500mm)</option>
      <option value="400">강판 (유효폭 400mm)</option>
    </select>
  </div>
  <button class="btn-calc" onclick="renderAll()">계산</button>
</div>

<div class="outer">
  <div class="col-left">
    <div class="card">
      <p class="sec-title">① 지붕 평면도 (위에서 본 모습)</p>
      <div id="planWrap"><p class="empty">수치를 입력해 주세요</p></div>
    </div>
    <div class="card">
      <p class="sec-title">② 단면도 (옆에서 본 경사 프로파일)</p>
      <div id="sectionWrap"><p class="empty">수치를 입력해 주세요</p></div>
    </div>
  </div>
  <div class="col-right">
    <div class="card">
      <p class="sec-title">색상 범례</p>
      <div id="legendWrap"></div>
    </div>
    <div class="card">
      <p class="sec-title">수량표</p>
      <div id="countTableWrap"><p class="empty" style="padding:20px 0">—</p></div>
    </div>
  </div>
</div>

<div class="card" style="margin-top:14px">
  <p class="sec-title">📦 발주표</p>
  <div id="orderTableWrap"><p class="empty" style="padding:10px 0">—</p></div>
  <p class="note">
    ※ 강판 1장 = 유효폭 × 경사길이(빗면) &nbsp;|&nbsp;
    ※ 주문사이즈 = 경사길이 + 여유 150mm, 50mm 단위 올림 &nbsp;|&nbsp;
    ※ 경사길이 = 세로(처마포함) × 경사계수 &nbsp;|&nbsp;
    ※ 전 장수 동일 규격 (1면 시공)
  </p>
</div>

<script>
const QS = new URLSearchParams(location.search);
function qp(k){ return QS.get(k); }

window.addEventListener('load', () => {
  if(qp('w'))  document.getElementById('inp-W').value = parseFloat(qp('w')).toFixed(3);
  if(qp('d'))  document.getElementById('inp-D').value = parseFloat(qp('d')).toFixed(3);
  if(qp('p'))  document.getElementById('inp-p').value = qp('p');
  if(qp('ew')){
    const sel = document.getElementById('inp-ew');
    for(let i=0;i<sel.options.length;i++)
      if(sel.options[i].value===qp('ew')) sel.selectedIndex=i;
  }
  if(qp('w')&&qp('d')&&qp('p')) renderAll();
});

const NS='http://www.w3.org/2000/svg';
function mk(tag,attrs){
  const e=document.createElementNS(NS,tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}
function mRect(x,y,w,h,fill,stroke,sw=0.5){
  return mk('rect',{x,y,width:w,height:h,fill,stroke,'stroke-width':sw});
}
function mLine(x1,y1,x2,y2,stroke='#666',sw=1,dash=''){
  const e=mk('line',{x1,y1,x2,y2,stroke,'stroke-width':sw});
  if(dash)e.setAttribute('stroke-dasharray',dash);
  return e;
}
function mTxt(x,y,t,size=11,color='#333',anchor='middle',weight='normal'){
  const e=mk('text',{x,y,'font-size':size,fill:color,'text-anchor':anchor,
    'font-family':'Malgun Gothic,sans-serif','font-weight':weight});
  e.textContent=t; return e;
}
function mPoly(pts,fill,stroke,sw=1){
  return mk('polygon',{points:pts.map(p=>p.join(',')).join(' '),fill,stroke,'stroke-width':sw});
}
function mArrow(svg,x1,y1,x2,y2,color='#666',sw=1.5){
  svg.appendChild(mLine(x1,y1,x2,y2,color,sw));
  const ang=Math.atan2(y2-y1,x2-x1);
  const al=8, aa=0.5;
  svg.appendChild(mk('polygon',{
    points:`${x2},${y2} ${x2-al*Math.cos(ang-aa)},${y2-al*Math.sin(ang-aa)} ${x2-al*Math.cos(ang+aa)},${y2-al*Math.sin(ang+aa)}`,
    fill:color
  }));
}
function dimLine(svg,x1,y1,x2,y2,label,color='#888',size=10){
  svg.appendChild(mLine(x1,y1,x2,y2,color,1));
  if(x1===x2){
    svg.appendChild(mLine(x1-5,y1,x1+5,y1,color,1));
    svg.appendChild(mLine(x1-5,y2,x1+5,y2,color,1));
    const t=mTxt(x1-14,(y1+y2)/2,label,size,color,'middle');
    t.setAttribute('transform',`rotate(-90,${x1-14},${(y1+y2)/2})`);
    svg.appendChild(t);
  } else {
    svg.appendChild(mLine(x1,y1-5,x1,y1+5,color,1));
    svg.appendChild(mLine(x2,y2-5,x2,y2+5,color,1));
    svg.appendChild(mTxt((x1+x2)/2,y1-8,label,size,color,'middle'));
  }
}
function getOrderSize(len){
  return (Math.ceil((len+0.15)/0.05)*0.05).toFixed(2);
}

function renderAll(){
  const W_m = parseFloat(document.getElementById('inp-W').value);
  const D_m = parseFloat(document.getElementById('inp-D').value);
  const p   = parseFloat(document.getElementById('inp-p').value);
  const ewMM= parseFloat(document.getElementById('inp-ew').value);

  if(isNaN(W_m)||isNaN(D_m)||isNaN(p)||W_m<=0||D_m<=0||p<=0){
    alert('수치를 올바르게 입력해 주세요.'); return;
  }

  const ew_m     = ewMM/1000;
  const pfactor  = Math.sqrt(1+Math.pow(p/10,2));
  const slopeLen = parseFloat((D_m*pfactor).toFixed(3));
  const H_m      = parseFloat((D_m*(p/10)).toFixed(3));
  const nStrips  = Math.ceil(parseFloat((W_m/ew_m).toFixed(6)));
  const orderSz  = getOrderSize(slopeLen);

  document.getElementById('specLine').textContent =
    `W=${W_m}m × D=${D_m}m | 경사 ${p}치 | 경사계수 ${pfactor.toFixed(4)} | 경사길이 ${slopeLen}m | 유효폭 ${ewMM}mm | 합계 ${nStrips}장`;

  drawPlan(W_m, D_m, ew_m, nStrips);
  drawSection(D_m, p, slopeLen, H_m);
  renderTables(ewMM, slopeLen, orderSz, nStrips);
}

// ① 평면도
function drawPlan(W_m, D_m, ew_m, nStrips){
  const SC=50, MX=72, MY=58;
  const W=W_m*SC, D=D_m*SC, SW=ew_m*SC;
  const svg=mk('svg',{width:W+MX+70, height:D+MY+70});

  const FILL='#5ba4f5', STR='#1a5fb4';

  // 스트립
  for(let i=0;i<nStrips;i++){
    const x1=i*SW, x2=Math.min((i+1)*SW,W), xc=(x1+x2)/2, w=x2-x1;
    svg.appendChild(mRect(MX+x1, MY, w, D, FILL, STR, 0.4));
    if(w>12) svg.appendChild(mTxt(MX+xc, MY+D/2+4, `${i+1}`, w>22?9:6, '#1a3a6a','middle','bold'));
  }

  // 구분선
  for(let i=1;i<nStrips;i++){
    svg.appendChild(mLine(MX+i*SW, MY, MX+i*SW, MY+D, '#1a5fb4', 0.4));
  }

  // 경계선
  svg.appendChild(mLine(MX, MY, MX+W, MY, '#333', 2));        // 낮은처마
  svg.appendChild(mLine(MX, MY+D, MX+W, MY+D, '#c04000', 2)); // 높은쪽
  svg.appendChild(mLine(MX, MY, MX, MY+D, '#555', 2));
  svg.appendChild(mLine(MX+W, MY, MX+W, MY+D, '#555', 2));

  // 경사 방향 화살표
  const ax=MX+W+18, ay1=MY+D*0.7, ay2=MY+D*0.15;
  mArrow(svg, ax, ay1, ax, ay2, '#c04000', 2);
  svg.appendChild(mTxt(ax, ay1+14, '경사↑', 9, '#c04000','middle','bold'));

  // 라벨
  svg.appendChild(mTxt(MX+W/2, MY-10, '낮은처마 (저단)', 10, '#444','middle','bold'));
  svg.appendChild(mTxt(MX+W/2, MY+D+18, '높은쪽 (고단)', 10, '#c04000','middle','bold'));
  svg.appendChild(mTxt(MX+W/2, MY+D/2+4, '시공면', 13, '#fff','middle','bold'));

  // 치수
  dimLine(svg, MX, MY-32, MX+W, MY-32, `처마포함 가로 ${W_m}m`);
  dimLine(svg, MX-40, MY, MX-40, MY+D, `처마포함 세로 ${D_m}m`);

  // 첫 스트립 유효폭
  const sw1=Math.min(SW,W);
  svg.appendChild(mLine(MX, MY+D+28, MX+sw1, MY+D+28, '#888', 0.8));
  svg.appendChild(mLine(MX, MY+D+24, MX, MY+D+32, '#888', 1));
  svg.appendChild(mLine(MX+sw1, MY+D+24, MX+sw1, MY+D+32, '#888', 1));
  svg.appendChild(mTxt(MX+sw1/2, MY+D+42, `유효폭 ${ew_m.toFixed(3)}m`, 8, '#888'));

  const wrap=document.getElementById('planWrap');
  wrap.innerHTML=''; wrap.appendChild(svg);
}

// ② 단면도 (외쪽: 직각삼각형)
function drawSection(D_m, p, slopeLen, H_m){
  const SC=55, MX=80, MY=50;
  const Dpx=D_m*SC, Hpx=H_m*SC;

  const svgW=MX+Dpx+80, svgH=MY+Hpx+90;
  const svg=mk('svg',{width:svgW, height:svgH});

  // 직각삼각형: 저단(좌하) → 고단(우상) → 우하 → 저단
  const A=[MX, MY+Hpx];         // 저단 처마
  const B=[MX+Dpx, MY];         // 고단 (경사면 상단)
  const C=[MX+Dpx, MY+Hpx];    // 우측 하단 (직각점)
  svg.appendChild(mPoly([A,B,C], '#d0e8ff', '#1a5fb4', 1.5));

  // 수평 기준선
  svg.appendChild(mLine(MX-15, MY+Hpx, MX+Dpx+15, MY+Hpx, '#888', 0.8, '5,3'));

  // 수직 높이 (우측)
  svg.appendChild(mLine(MX+Dpx+12, MY, MX+Dpx+12, MY+Hpx, '#cc2020', 1));
  svg.appendChild(mLine(MX+Dpx+7, MY, MX+Dpx+17, MY, '#cc2020', 1));
  svg.appendChild(mLine(MX+Dpx+7, MY+Hpx, MX+Dpx+17, MY+Hpx, '#cc2020', 1));
  svg.appendChild(mTxt(MX+Dpx+26, (MY+MY+Hpx)/2, `H=${H_m}m`, 9, '#cc2020','start'));

  // 경사길이 라벨 (사면 중간)
  const lMidX=(A[0]+B[0])/2-8, lMidY=(A[1]+B[1])/2-4;
  const ang=Math.atan2(B[1]-A[1], B[0]-A[0])*180/Math.PI;
  const lt=mTxt(lMidX, lMidY, `${slopeLen}m`, 10, '#1a3a6a','middle','bold');
  lt.setAttribute('transform',`rotate(${ang},${lMidX},${lMidY})`);
  svg.appendChild(lt);

  // 직각 표시
  svg.appendChild(mk('rect',{x:MX+Dpx-14,y:MY+Hpx-14,width:14,height:14,fill:'none',stroke:'#888','stroke-width':1}));

  // 처마 라벨
  svg.appendChild(mTxt(MX, MY+Hpx+14, '저단\n(낮은처마)', 9, '#444','middle'));
  svg.appendChild(mTxt(MX+Dpx, MY-10, '고단\n(높은쪽)', 9, '#c04000','middle','bold'));

  // 수평 치수
  dimLine(svg, MX, MY+Hpx+35, MX+Dpx, MY+Hpx+35, `세로 ${D_m}m (수평)`, '#888', 9);

  // 경사도 표시
  const angDeg=Math.atan(p/10)*180/Math.PI;
  svg.appendChild(mTxt(MX+Dpx/4, MY+Hpx-10, `${p}치 (${angDeg.toFixed(1)}°)`, 9, '#5070a0','middle'));

  const wrap=document.getElementById('sectionWrap');
  wrap.innerHTML=''; wrap.appendChild(svg);
}

// 수량표 + 발주표
function renderTables(ewMM, slopeLen, orderSz, nStrips){
  document.getElementById('legendWrap').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px">
      <div style="width:24px;height:13px;background:#5ba4f5;border:1px solid #1a5fb4;border-radius:3px;flex-shrink:0"></div>
      <div>시공면 (1면)</div>
    </div>
    <p class="note" style="margin-top:10px">
      ※ 외쪽지붕 — 경사면 1면만 시공<br>
      ※ 유효폭 ${ewMM}mm × 경사길이 ${slopeLen}m<br>
      ※ 경사길이 = 세로(D) × 경사계수<br>
      ※ 전 장수 동일 규격
    </p>`;

  document.getElementById('countTableWrap').innerHTML=`
    <div class="tbl-wrap"><table>
      <tr><th>면</th><th>실길이(m)</th><th>주문(m)</th><th>장수</th></tr>
      <tr>
        <td>시공면</td>
        <td>${slopeLen}</td>
        <td>${orderSz}</td>
        <td><b>${nStrips}장</b></td>
      </tr>
      <tr class="tr-sub"><td colspan="3">합 계</td><td><b>${nStrips}장</b></td></tr>
    </table></div>
    <p class="note" style="margin-top:8px">
      ※ 총 ${nStrips}줄 × 1면 = <b>${nStrips}장</b><br>
      ※ 주문 ${orderSz}m 단일 규격
    </p>`;

  document.getElementById('orderTableWrap').innerHTML=`
    <table style="width:100%;max-width:500px">
      <tr><th>주문사이즈</th><th>장수</th></tr>
      <tr><td><b>${orderSz}m</b></td><td><b>${nStrips}장</b></td></tr>
      <tr class="tr-grand"><td><b>합 계</b></td><td><b>${nStrips}장</b></td></tr>
    </table>`;
}
</script>
</body>
</html>
